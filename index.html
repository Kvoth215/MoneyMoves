<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Money Moves — PA Financial Literacy</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:18px}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f7f2;color:#1a1a1a;min-height:100vh}
#root{max-width:1280px;margin:0 auto;padding:32px 28px}
.screen{animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.app-logo{font-size:0.75rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#639922;margin-bottom:32px}
.hero-title{font-size:2.6rem;font-weight:800;line-height:1.2;margin-bottom:12px}
.hero-sub{font-size:1.15rem;color:#555;margin-bottom:32px;line-height:1.7;max-width:680px}
button{cursor:pointer;font-family:inherit;font-size:1rem;border:none;transition:all .15s}
.btn{padding:14px 28px;border-radius:10px;font-weight:700;font-size:1rem}
.btn-primary{background:#3B6D11;color:#fff}
.btn-primary:hover{background:#27500A}
.btn-primary:disabled{background:#9bbf76;cursor:not-allowed}
.btn-secondary{background:#fff;color:#1a1a1a;border:2px solid #ddd}
.btn-secondary:hover{background:#f0f4eb;border-color:#639922}
input[type=text],input[type=number]{font-family:inherit;font-size:1.05rem;padding:13px 16px;border:2px solid #ddd;border-radius:10px;outline:none;background:#fff;color:#1a1a1a}
input[type=text]:focus,input[type=number]:focus{border-color:#639922;box-shadow:0 0 0 3px rgba(99,153,34,.15)}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
textarea{font-family:inherit;font-size:1rem;padding:14px 16px;border:2px solid #ddd;border-radius:10px;outline:none;background:#fff;color:#1a1a1a;resize:vertical;line-height:1.7}
textarea:focus{border-color:#639922;box-shadow:0 0 0 3px rgba(99,153,34,.15)}
.card{background:#fff;border-radius:16px;border:2px solid #e8ede0;padding:28px}
.selectable{cursor:pointer;transition:border-color .15s,box-shadow .15s}
.selectable:hover{border-color:#639922;box-shadow:0 4px 16px rgba(99,153,34,.15)}
.selectable.selected{border-color:#3B6D11;border-width:3px;background:#f0f4eb}
.badge{display:inline-block;font-size:0.72rem;font-weight:700;padding:5px 12px;border-radius:20px;letter-spacing:.05em;margin-bottom:12px}
.badge-green{background:#d4edaa;color:#27500A}
.badge-amber{background:#fde9b0;color:#7a4f00}
.badge-coral{background:#fdd5c8;color:#7a2800}
.card-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.scenario-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.scenario-card{background:#fff;border:2px solid #e8ede0;border-radius:16px;padding:26px;cursor:pointer;transition:all .15s}
.scenario-card:hover{border-color:#639922;box-shadow:0 6px 20px rgba(99,153,34,.18);transform:translateY(-3px)}
.scenario-icon{font-size:2.4rem;display:block;margin-bottom:14px}
.scenario-title{font-size:1.05rem;font-weight:700;margin-bottom:8px}
.scenario-desc{font-size:0.9rem;color:#555;line-height:1.6}
.scenario-tag{font-size:0.8rem;color:#639922;font-weight:700;margin-top:12px}
.game-wrap{display:grid;grid-template-columns:1fr 260px;gap:22px;align-items:start}
.game-main{display:flex;flex-direction:column;gap:18px}
.game-sidebar{display:flex;flex-direction:column;gap:14px}
.week-pill{display:inline-flex;align-items:center;gap:6px;background:#e8f0d8;color:#3B6D11;font-size:0.8rem;font-weight:700;padding:6px 16px;border-radius:20px}
.phase-pill{display:inline-flex;align-items:center;gap:6px;font-size:0.8rem;font-weight:700;padding:6px 16px;border-radius:20px}
.phase-math{background:#fff3cd;color:#7a5c00}
.phase-reflect{background:#e8e8ff;color:#3333aa}
.narrative-text{font-size:1.05rem;line-height:1.85;color:#1a1a1a;margin-bottom:16px}
.situation-box{background:#f5f7f2;border-left:4px solid #639922;border-radius:0 10px 10px 0;padding:16px 20px;font-size:1.05rem;font-weight:700;color:#222;margin-bottom:20px;line-height:1.6}
.result-banner{background:#e8f5d0;border:2px solid #b5d87a;border-radius:10px;padding:16px 18px;margin-bottom:18px;font-size:1rem;color:#27500A;line-height:1.6}
.result-banner strong{display:block;font-size:0.75rem;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;color:#3B6D11;font-weight:700}
.choices{display:flex;flex-direction:column;gap:12px}
.choice-btn{background:#fff;border:2px solid #ddd;border-radius:12px;padding:18px 20px;text-align:left;transition:all .15s;line-height:1.6;font-size:1rem}
.choice-btn:hover{border-color:#639922;background:#f5f9ee;transform:translateX(4px)}
.choice-letter{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;background:#3B6D11;color:#fff;border-radius:50%;font-size:0.85rem;font-weight:700;margin-right:12px;flex-shrink:0}
.choice-impact{font-size:0.88rem;color:#666;margin-top:8px;margin-left:42px}
.impact-earn{color:#27500A;font-weight:700}
.impact-spend{color:#993C1D;font-weight:700}
.stat-card{background:#fff;border:2px solid #e8ede0;border-radius:12px;padding:18px 20px}
.stat-label{font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#888;margin-bottom:8px}
.stat-value{font-size:2rem;font-weight:800}
.val-green{color:#27500A}
.val-red{color:#cc3300}
.tip-card{background:#fffbf0;border:2px solid #f5d87a;border-radius:12px;padding:18px 20px}
.tip-head{font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#7a5c00;margin-bottom:8px}
.tip-text{font-size:0.92rem;color:#5a4400;line-height:1.7}
.std-label{font-size:0.78rem;color:#aaa;padding:8px 0}
.progress-wrap{margin-bottom:22px}
.progress-label{display:flex;justify-content:space-between;font-size:0.85rem;color:#888;margin-bottom:8px;font-weight:700}
.progress-track{height:8px;background:#e0e8d0;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#639922,#3B6D11);border-radius:4px;transition:width .5s ease}
.tab-bar{display:flex;gap:10px;margin-bottom:22px}
.tab-btn{background:none;border:2px solid #ddd;border-radius:10px;padding:10px 22px;font-size:0.92rem;font-weight:700;color:#666}
.tab-btn.active{background:#3B6D11;color:#fff;border-color:#3B6D11}
.tab-btn:hover:not(.active){border-color:#639922;color:#3B6D11}
.sheet-wrap{overflow-x:auto}
.sheet-table{width:100%;border-collapse:collapse;font-size:0.92rem;margin-top:6px}
.sheet-table th{background:#f0f4eb;padding:14px 16px;text-align:left;font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#3B6D11;border-bottom:2px solid #c8dba0}
.sheet-table td{padding:13px 16px;border-bottom:1px solid #eef2e8;font-size:0.95rem}
.sheet-table tr:last-child td{border-bottom:none}
.sheet-table tr:hover td{background:#fafcf7}
.sheet-table .total-row td{background:#f0f4eb;font-weight:700;border-top:2px solid #c8dba0;font-size:0.95rem}
.cell-earn{color:#27500A;font-weight:700}
.cell-spend{color:#cc3300;font-weight:700}
.cell-bal-pos{color:#27500A;font-weight:800}
.cell-bal-neg{color:#cc3300;font-weight:800}
.wk-label{font-size:0.8rem;color:#888;font-weight:700}
.net-box{display:inline-block;padding:8px 18px;border-radius:8px;font-size:1rem;font-weight:800;margin-top:14px}
.net-pos{background:#e8f5d0;color:#27500A}
.net-neg{background:#fde8e0;color:#cc3300}
.summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin:24px 0}
.summary-stat{background:#fff;border:2px solid #e8ede0;border-radius:12px;padding:22px}
.summary-num{font-size:2.2rem;font-weight:800;margin-top:8px}
.history-list{display:flex;flex-direction:column;gap:0}
.history-item{padding:14px 0;border-bottom:1px solid #eef2e8;font-size:0.95rem}
.history-wk{font-size:0.8rem;font-weight:700;color:#639922;display:block;margin-bottom:4px}
.outcome-msg{background:#e8f5d0;border:2px solid #b5d87a;border-radius:12px;padding:20px 24px;margin:20px 0;font-size:1.1rem;color:#27500A;line-height:1.7}
.outcome-msg.loss{background:#fde8e0;border-color:#f5b5a0;color:#993C1D}
.nav-row{display:flex;align-items:center;gap:14px;margin-bottom:24px}
.back-btn{background:none;border:none;font-size:0.92rem;color:#888;font-weight:700;padding:0}
.back-btn:hover{color:#3B6D11}
.math-box{background:#fffbf0;border:2px solid #f5d87a;border-radius:14px;padding:26px;margin-bottom:20px}
.math-head{font-size:0.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#7a5c00;margin-bottom:12px}
.math-question{font-size:1.1rem;font-weight:600;color:#1a1a1a;line-height:1.75;margin-bottom:20px}
.math-input-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.math-input-row input{width:160px;font-size:1.3rem;font-weight:700;text-align:center}
.math-feedback{margin-top:14px;padding:14px 18px;border-radius:10px;font-size:1rem;font-weight:600}
.math-correct{background:#e8f5d0;color:#27500A;border:2px solid #b5d87a}
.math-wrong{background:#fde8e0;color:#cc3300;border:2px solid #f5b5a0}
.math-hint{font-size:0.9rem;font-weight:400;margin-top:8px;color:#555}
.attempt-count{font-size:0.85rem;color:#888;margin-top:10px}
.reflect-box{background:#f0f0ff;border:2px solid #c8c8f5;border-radius:14px;padding:26px;margin-bottom:20px}
.reflect-head{font-size:0.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#3333aa;margin-bottom:12px}
.reflect-prompt{font-size:1.05rem;font-weight:600;color:#1a1a1a;line-height:1.7;margin-bottom:16px}
.reflect-counter{font-size:0.85rem;margin-top:8px;text-align:right}
.reflect-requirement{font-size:0.88rem;color:#666;font-style:italic;margin-bottom:12px}
.feature-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;max-width:800px}
.feature-item{background:#fff;border:2px solid #e8ede0;border-radius:12px;padding:20px;text-align:center}
.feature-icon{font-size:2rem;margin-bottom:10px}
.feature-label{font-size:0.85rem;color:#555;line-height:1.5}
.feature-title{font-size:0.95rem;font-weight:700;margin-bottom:5px}
@media(max-width:900px){
  html{font-size:16px}
  .card-grid-3,.scenario-grid{grid-template-columns:1fr 1fr}
  .game-wrap{grid-template-columns:1fr}
  .game-sidebar{display:grid;grid-template-columns:repeat(2,1fr)}
  .summary-grid{grid-template-columns:repeat(2,1fr)}
  .feature-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:560px){
  html{font-size:15px}
  #root{padding:20px 14px}
  .scenario-grid,.card-grid-3{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState} = React;
const MIN_REFLECT = 80;

const SCENARIOS=[{id:"lemonade",title:"Lemonade Stand",icon:"🍋",description:"Start a neighborhood business and manage income, expenses, and tough decisions.",startBalance:20,paAreas:"17.2 · 17.3",weeks:[{week:1,narrative:"It's the hottest week of summer! Your neighbor Mrs. Chen is selling a big bag of lemons cheap, and your parents gave you the green light to set up a lemonade stand on the corner. You have $20 to start your business.",situation:"You need supplies to open your stand. How much will you spend to get started?",paStandard:"17.3.3-5.D",tip:"Keeping startup costs low means you reach profit faster — spend only what you truly need.",mathChallenge:{question:"You have $20 to start. If you spend $8 on basic supplies, how much money will you have left over?",answer:12,tolerance:0.01,hint:"Starting money minus what you spend = what's left. $20 - $8 = ?"},reflectionPrompt:"Explain in your own words why keeping startup costs low is important for a new business. Use a specific example from this scenario.",choices:[{text:"Buy the basics — lemons, sugar, paper cups, and a handmade sign ($8)",impact:{income:0,expense:8,description:"Bought basic supplies"},consequence:"Smart and lean! Your setup looks friendly and inviting. Low startup costs mean you need to sell fewer cups before you make a profit."},{text:"Go big — fancy pitcher, matching cups, printed banner, and premium ingredients ($18)",impact:{income:0,expense:18,description:"Bought premium supplies"},consequence:"Your stand looks amazing! But you've spent most of your starting money. You'll need solid sales just to break even this week."},{text:"Use stuff from home and spend as little as possible ($3)",impact:{income:0,expense:3,description:"Used household supplies"},consequence:"You stretched every dollar! The stand looks a little scrappy, but it works — and you have almost all your startup money still in hand."}]},{week:2,narrative:"Day one is here! Neighbors and kids are passing by on their way to the park. Your first customer, sweaty Mr. Alvarez from down the block, walks over with his wallet out.",situation:"You need to decide: what is the right price to charge per cup of lemonade?",paStandard:"17.2.3-5.G",tip:"The right price covers your costs and attracts customers. Too high = fewer sales. Too low = too little profit.",mathChallenge:{question:"If you charge $1.00 per cup and sell 20 cups in one day, how much total money do you earn?",answer:20,tolerance:0.01,hint:"Price per cup × number of cups sold = total earned. $1.00 × 20 = ?"},reflectionPrompt:"Think about the three pricing options (A, B, C). What is the risk of charging too little? What is the risk of charging too much? Which risk is more dangerous for a new business and why?",choices:[{text:"Charge $1.00 per cup — affordable and fair for the neighborhood",impact:{income:20,expense:0,description:"Sold 20 cups at $1.00"},consequence:"Perfect pricing! You sold 20 cups on your first day. Word spread fast and customers kept returning. Profit is building up nicely."},{text:"Charge $2.50 per cup — lemonade this good is worth it",impact:{income:10,expense:0,description:"Sold 4 cups at $2.50"},consequence:"Most neighbors thought $2.50 was too steep. Only 4 cups sold — even at a higher price, fewer sales can mean less total money."},{text:"Charge $0.50 per cup — cheap prices bring more customers",impact:{income:15,expense:0,description:"Sold 30 cups at $0.50"},consequence:"Tons of customers! You sold 30 cups — but $0.50 each barely covers your costs. High volume doesn't always mean high profit."}]},{week:3,narrative:"Business is going well — then you check the weekend forecast. A thunderstorm is coming Saturday, your busiest day. You've already bought fresh lemons and supplies.",situation:"The storm will wipe out your outdoor sales. What's your plan?",paStandard:"17.5.3-5.A",tip:"Unexpected events happen to every business. Smart owners have a backup plan ready before they need it.",mathChallenge:{question:"On a normal Saturday you sell 25 cups at $1.00 each. If rain cuts your sales to 40% of normal, how many cups will you sell during the storm?",answer:10,tolerance:0.5,hint:"40% of 25 = 0.40 × 25 = ?"},reflectionPrompt:"The storm is an unexpected event outside your control. Name TWO things a smart business owner can do in advance to prepare for events like this. Explain each one clearly.",choices:[{text:"Move your stand under a covered porch and stay open through the rain",impact:{income:12,expense:2,description:"Adapted setup, sold in rain"},consequence:"Resourceful thinking! Fewer customers came, but you stayed open and still made sales. You didn't let the weather beat you."},{text:"Close for the day and save your supplies for next week",impact:{income:0,expense:0,description:"Closed — saved supplies"},consequence:"No income today, but your supplies are perfectly preserved. Sometimes protecting your resources is the smarter move."},{text:"Text neighbors to offer front-door lemonade delivery for $1.50 per cup",impact:{income:18,expense:3,description:"Delivered lemonade to neighbors"},consequence:"Creative pivot! Neighbors loved the delivery idea. You turned a bad weather day into a brand new service — and earned more than a normal day!"}]},{week:4,narrative:"Uh oh. Your neighbor Jordan just opened their own lemonade stand two houses away. They're charging $0.75 a cup, have a big colorful umbrella, and are playing upbeat music.",situation:"A competitor just showed up. How do you respond?",paStandard:"17.3.6-8.A",tip:"Competition is normal in business. Often improving your product or service beats just lowering your price.",mathChallenge:{question:"Your stand sells 18 cups at $1.00 each. Jordan's stand sells 24 cups at $0.75 each. Who earns more, and what is the DIFFERENCE in earnings between the two stands?",answer:0,tolerance:0.01,hint:"Your earnings: 18 × $1.00 = $18. Jordan's earnings: 24 × $0.75 = $18. Difference = $18 - $18 = ?"},reflectionPrompt:"This week introduced competition. In your own words, explain what competition is and describe ONE way competition can actually benefit customers. Use a specific example from this scenario.",choices:[{text:"Match Jordan's $0.75 price and add a free cookie with every cup",impact:{income:15,expense:5,description:"Matched price, added cookie deal"},consequence:"The cookie combo was a huge hit! Loyal customers stayed and new ones came specifically for the deal. Smart competitive thinking."},{text:"Keep your price and trust that your loyal customers will stick with you",impact:{income:8,expense:0,description:"Kept original pricing"},consequence:"Some customers stayed loyal — but others drifted to Jordan's lower price. Competition is real and can quietly chip away at sales."},{text:"Walk over and propose that you and Jordan team up instead of compete",impact:{income:20,expense:0,description:"Partnered with Jordan"},consequence:"Brilliant! You split the block and sent customers to each other. Both stands thrived working together — cooperation can beat competition."}]},{week:5,narrative:"You've been running the stand for a month and built up real earnings. School starts in three weeks. It's time to think about what happens to the money you've made.",situation:"The summer is ending — what do you do with your earnings?",paStandard:"17.4.3-5.B",tip:"A good habit is to divide any money you earn: some to save, some to spend, and some to reinvest or give.",mathChallenge:{question:"You earned $60 this summer from your stand. If you save 75% of it, how much money will you save? Enter the saved amount.",answer:45,tolerance:0.01,hint:"75% of $60 = 0.75 × $60 = ? The remaining 25% = $15 to spend."},reflectionPrompt:"Financial experts often say 'pay yourself first' — meaning save before you spend. Do you agree or disagree with this idea? Write 2-3 sentences defending your position with at least one specific reason.",choices:[{text:"Save 75% in a jar labeled for next summer, spend 25% on something you want",impact:{income:0,expense:0,description:"Saved most, spent a little"},consequence:"Great balance! You rewarded yourself AND kept most of your earnings for later. Financial experts call this 'paying yourself first.'"},{text:"Reinvest everything back into supplies and savings for next summer's launch",impact:{income:0,expense:12,description:"Reinvested in future business"},consequence:"Long-term thinking! You gave up short-term spending for a big head start next summer. That takes real discipline and patience."},{text:"You earned it — spend most of it on things you've been wanting all summer",impact:{income:0,expense:22,description:"Spent most of earnings"},consequence:"You had a fantastic week! But spending most of what you earned means starting from near zero next time. Treating yourself is fine — just not all at once."}]},{week:6,narrative:"The last day of summer is here. You're putting away the pitcher, counting your final balance, and looking back on the wild ride of running your very first business.",situation:"You made it through a whole season! What's your final move?",paStandard:"17.1.6-8.A",tip:"Reflecting on decisions — what worked, what didn't — makes you smarter about money every single time.",mathChallenge:{question:"You started with $20. Your total income this summer was $95 and your total expenses were $48. What is your final balance?",answer:67,tolerance:0.01,hint:"Start with $20. Add total income. Subtract total expenses. $20 + $95 - $48 = ?"},reflectionPrompt:"Look back at all six weeks. Describe ONE decision you would change and explain specifically how it would have improved your final balance. Be as specific as possible.",choices:[{text:"Write down everything you learned this summer and what you'd do differently",impact:{income:5,expense:0,description:"Late customer paid! +$5 bonus"},consequence:"This is exactly what successful business owners do — reflect, document, and improve. A customer who owed you money also paid up today!"},{text:"Tell your three best friends about the experience and invite them to go bigger together next summer",impact:{income:0,expense:0,description:"Planned for the future"},consequence:"Sharing experience builds teams. A bigger crew next summer could mean more customers, more stands, and much more profit."},{text:"Pack up every supply neatly so everything is ready to go the moment summer starts again",impact:{income:0,expense:0,description:"Organized for next season"},consequence:"Organization is underrated! Everything in good condition means zero waste and zero extra costs when you launch again. Smart."}]}]},{id:"babysitting",title:"Babysitting Business",icon:"👶",description:"Build a client list, set your rate, and handle the real challenges of a service job.",startBalance:15,paAreas:"17.2 · 17.3 · 17.5",weeks:[{week:1,narrative:"You've decided to start babysitting in your neighborhood. You're responsible, great with kids, and your parents support the idea. The Martinez family next door needs a sitter this Friday.",situation:"How much will you charge per hour to babysit?",paStandard:"17.2.6-8.A",tip:"Research what others charge before setting your rate. Too low undervalues your time; too high loses clients.",mathChallenge:{question:"If you babysit for 3 hours at $12 per hour, how much will you earn for the whole job?",answer:36,tolerance:0.01,hint:"Hours worked × hourly rate = total earnings. 3 × $12 = ?"},reflectionPrompt:"Before setting a price for any service, what kinds of research should you do? List and explain at least TWO steps you could take to figure out a fair hourly rate for babysitting in your neighborhood.",choices:[{text:"Charge $12 per hour — a fair market rate for your area",impact:{income:24,expense:0,description:"Babysat 2 hours at $12/hr"},consequence:"Great research! $12/hr is competitive and the Martinez family was happy to pay it. They already asked you back for next week."},{text:"Charge $6 per hour — start low to get clients first",impact:{income:12,expense:0,description:"Babysat 2 hours at $6/hr"},consequence:"You got the job, but $6/hr is well below market rate. You worked hard for less than you deserved. Clients may also expect that price forever."},{text:"Charge $18 per hour — you're worth it",impact:{income:18,expense:0,description:"Babysat 2 hours at $18/hr"},consequence:"Bold price! The family hesitated but agreed since you come highly recommended. You earned well — but some families may shop around at that rate."}]},{week:2,narrative:"Word spreads fast. Two families want you this Saturday — the Garcias at 5pm and the Nguyens at 6pm. The jobs overlap by two hours and you can only take one.",situation:"You can only take one job. Which do you choose and how do you handle the other family?",paStandard:"17.1.6-8.B",tip:"Every decision has an opportunity cost — choosing one option means giving up the benefits of another.",mathChallenge:{question:"The Garcia job pays $12/hr for 2 hours. The Nguyen job pays $14/hr for 2 hours. What is the total earnings difference between the two jobs?",answer:4,tolerance:0.01,hint:"Garcias: 2 × $12 = $24. Nguyens: 2 × $14 = $28. Difference = $28 - $24 = ?"},reflectionPrompt:"This week introduced 'opportunity cost.' Define it in your own words and give ONE example from your own life (not from this scenario) where you experienced it.",choices:[{text:"Take the Garcia job (booked first) and politely recommend your reliable friend to the Nguyens",impact:{income:24,expense:0,description:"Babysat Garcias, referred Nguyens"},consequence:"Professional and fair! The Garcias appreciated that you honored the first commitment. The Nguyens respected your referral and remember you positively."},{text:"Take the Nguyen job because they offered $2/hr more",impact:{income:28,expense:0,description:"Chose higher-paying job"},consequence:"You earned more tonight — but the Garcias were disappointed and may not call again. Reputation is worth more than a $4 difference."},{text:"Try to split your time and do both — 1 hour at each house",impact:{income:14,expense:0,description:"Split between two jobs"},consequence:"Both families felt shortchanged and neither paid the full rate. Trying to do both poorly is often worse than doing one thing well."}]},{week:3,narrative:"While babysitting the Johnsons' kids, one of them accidentally knocks over and breaks a small decorative lamp. The family comes home and notices right away.",situation:"A child you were watching broke something. What do you do?",paStandard:"17.5.6-8.A",tip:"Accidents happen in any job. How you handle them shapes your reputation more than the accident itself.",mathChallenge:{question:"You earned $20 babysitting tonight. The broken lamp costs $16 to replace. If you offer to pay half, how much will you have left after paying your share?",answer:12,tolerance:0.01,hint:"Half of $16 = $8. Your earnings: $20. $20 - $8 = ?"},reflectionPrompt:"Honesty and integrity matter in any job. Describe a situation — real or imagined — where being honest about a mistake actually improved a relationship rather than damaged it. What made the difference?",choices:[{text:"Be honest right away, apologize, and offer to pay half the cost with tonight's earnings",impact:{income:20,expense:8,description:"Paid partial repair — kept integrity"},consequence:"The Johnsons were impressed by your honesty. They covered the rest, gave you a full tip, and said you're their permanent sitter. Trust is priceless."},{text:"Tell the Johnsons what happened but explain the kids caused it and it's not your responsibility",impact:{income:20,expense:0,description:"Declined responsibility"},consequence:"Technically the kids did it — but you were in charge. The Johnsons were unhappy with how you handled it and didn't call you again."},{text:"Say nothing and hope they don't notice right away",impact:{income:20,expense:0,description:"Said nothing about the lamp"},consequence:"They noticed immediately. Being caught not telling the truth was far worse than the broken lamp. You lost that client permanently."}]},{week:4,narrative:"Business is booming — you've got 4 regular families now. But your phone's battery is dying fast and you're unreachable during jobs. Clients are getting frustrated.",situation:"You need a reliable phone for work. How do you handle it?",paStandard:"17.3.6-8.A",tip:"Reliable tools are part of the cost of running a service business. Sometimes spending on the right thing earns you more.",mathChallenge:{question:"A portable charger costs $22. You earn $24 per job. How many full jobs must you complete before you earn back the cost of the charger? Round up to the nearest whole job.",answer:1,tolerance:0.01,hint:"Cost of charger ÷ earnings per job = jobs to pay it off. $22 ÷ $24 = 0.92, round up = ?"},reflectionPrompt:"Spending money to make your work better is called 'investing in your business.' Name ONE tool or expense a babysitter might need to do their job well. Explain specifically why it's worth paying for.",choices:[{text:"Buy a portable charger ($22) so your phone stays charged on every job",impact:{income:0,expense:22,description:"Bought portable charger"},consequence:"Problem solved! Families can always reach you. One client even gave you an extra job specifically because you're always reachable. Investment paid off."},{text:"Ask a parent to get a new phone — you'll pay them back from earnings",impact:{income:0,expense:0,description:"Borrowed against future earnings"},consequence:"Your parents agreed and fronted the money. Now you owe them from future jobs. Borrowing is okay — but it commits your future earnings."},{text:"Carry a charger from home each time and make sure you charge between jobs",impact:{income:0,expense:0,description:"Used existing resources"},consequence:"Creative use of what you already have! No cost, and the problem is mostly solved — as long as you remember to charge it every time."}]},{week:5,narrative:"You're thinking about how to grow your business. You currently rely on word-of-mouth. A friend suggests making a simple flyer to post in the neighborhood.",situation:"How will you market your babysitting business?",paStandard:"17.2.6-8.G",tip:"Marketing doesn't have to be expensive. Sometimes the most effective promotion costs almost nothing.",mathChallenge:{question:"You print 20 flyers at $0.10 each. One new client pays $12/hr for 2 hours each week for 4 weeks. What is your total PROFIT from the flyer investment? (Profit = earnings from new client - printing cost)",answer:94,tolerance:0.01,hint:"Printing cost: 20 × $0.10 = $2. New client: $12 × 2 hrs × 4 weeks = $96. Profit = $96 - $2 = ?"},reflectionPrompt:"Which of the three marketing options in this scenario would work best in YOUR neighborhood and why? Be specific — consider who lives nearby and how your neighbors communicate.",choices:[{text:"Design a simple flyer and post 20 copies at the library, grocery store, and community board ($2 for printing)",impact:{income:15,expense:2,description:"Flyer campaign — gained new client"},consequence:"A new family found your flyer and called right away! $2 in printing turned into a regular client. That's an incredible return on investment."},{text:"Ask current clients to refer you and offer a small thank-you discount",impact:{income:12,expense:5,description:"Referral discount program"},consequence:"Two clients referred friends! The discount cost you a little, but you gained two new regulars. Word-of-mouth with an incentive is powerful."},{text:"Post in your neighborhood's social media group with permission from your parents",impact:{income:20,expense:0,description:"Social media outreach — new clients"},consequence:"Three families reached out through the online post. Zero cost, great reach. Smart use of free tools already available to you."}]},{week:6,narrative:"End of the month! You've built a real little business with loyal clients and a growing reputation. Time to look at your full month of earnings and make a plan.",situation:"It's the end of your first month. How do you manage your babysitting income?",paStandard:"17.3.6-8.C",tip:"Tracking income and expenses — even in a simple list — helps you see what's working and where money is going.",mathChallenge:{question:"This month you earned $180. Your expenses totaled $29. What is your NET profit? If you save 20% of net profit, how much do you save? Enter the savings amount.",answer:30.2,tolerance:0.5,hint:"Net profit = $180 - $29 = $151. Savings = 20% of $151 = 0.20 × $151 = ?"},reflectionPrompt:"You've completed your first month in business. Write 2-3 sentences: describe the financial habit you're most proud of developing, and one habit you want to improve next month.",choices:[{text:"Record all your earnings and expenses in a notebook or spreadsheet to see your real profit",impact:{income:0,expense:0,description:"Tracked finances carefully"},consequence:"Excellent habit! You discovered you're making more than you thought — and found two small expenses you can cut next month. Knowledge is power."},{text:"Set aside 20% of total earnings as savings before spending anything else",impact:{income:0,expense:0,description:"Followed pay-yourself-first rule"},consequence:"Paying yourself first is a habit that wealthy people swear by. Even a small amount saved regularly builds up faster than you'd expect."},{text:"Treat yourself to something with this month's profit — you earned it",impact:{income:0,expense:20,description:"Celebrated with a purchase"},consequence:"You worked hard and deserve to enjoy some of it! Just be sure to keep some aside for business costs next month."}]}]},{id:"lawn",title:"Lawn Mowing Service",icon:"🌿",description:"Turn your weekends into income and learn what happens when equipment breaks and weather changes.",startBalance:25,paAreas:"17.2 · 17.4 · 17.5",weeks:[{week:1,narrative:"It's the beginning of spring and lawns everywhere are growing fast. Your block has 12 houses and several neighbors want yard help. You have $25 to start.",situation:"You need equipment. What's your strategy for getting started?",paStandard:"17.3.3-5.D",tip:"Before buying equipment, check what you can borrow. Keeping startup costs low lets you become profitable faster.",mathChallenge:{question:"You borrow a mower and spend $10 on gas and supplies. If you charge $25 per yard and mow 3 yards your first weekend, what is your total PROFIT? (Profit = income - expenses)",answer:65,tolerance:0.01,hint:"Income: 3 × $25 = $75. Expenses: $10. Profit = $75 - $10 = ?"},reflectionPrompt:"What is the difference between a 'startup cost' and an 'ongoing cost' in a business? Give ONE example of each for a lawn mowing service. Why does knowing the difference matter?",choices:[{text:"Borrow your family's mower and use your $25 only on gas and supplies ($10)",impact:{income:0,expense:10,description:"Borrowed mower, bought supplies"},consequence:"Smart move! Low startup costs mean every job is almost pure profit. You have $15 left as a safety net if anything goes wrong."},{text:"Buy a used mower from a neighbor for $40 so you own your own equipment",impact:{income:0,expense:40,description:"Bought used mower"},consequence:"You spent more than you had — you'll need to borrow $15. But now you own your mower and aren't dependent on anyone else's schedule."},{text:"Start with just a rake and weed trimmer for small jobs ($15)",impact:{income:0,expense:15,description:"Started with basic tools"},consequence:"Smart and low-risk! You can do cleanup jobs right away without a mower. Less income per job, but you're in business with very little risk."}]},{week:2,narrative:"You're ready to work! Three neighbors said they're interested. One asks, 'So what do you charge?' and you need a confident answer.",situation:"What will you charge to mow a standard yard?",paStandard:"17.2.6-8.A",tip:"Research local rates before answering. Professionals often charge $30–50. Students usually start a bit lower.",mathChallenge:{question:"You charge $25 per yard and mow 4 yards, spending $8 on gas. The total job took 6 hours. What is your NET hourly rate? (Round to the nearest cent.)",answer:15.33,tolerance:0.1,hint:"Net income: 4×$25 - $8 = $92. Hourly rate = $92 ÷ 6 hours = ?"},reflectionPrompt:"Why is it important to calculate your HOURLY rate, not just your total earnings? Compare these two jobs: $50 for 1 hour vs. $80 for 6 hours. Which pays better per hour? Show your work and explain.",choices:[{text:"Charge $25 per yard — competitive and great for a student",impact:{income:50,expense:5,description:"Mowed 2 yards at $25 each"},consequence:"Great price point! Both neighbors said yes immediately. You mowed two yards and earned $50 before gas. A solid start!"},{text:"Charge $15 per yard — keep it cheap to get more lawns",impact:{income:45,expense:5,description:"Mowed 3 yards at $15 each"},consequence:"You got three clients at $15 — but after gas, you made very little per hour. Low prices can attract business but hurt your bottom line."},{text:"Charge $35 per yard — professional quality, professional price",impact:{income:35,expense:5,description:"Mowed 1 yard at $35"},consequence:"One neighbor agreed at $35; the others thought it was too high for a student. You earned well but reached fewer clients."}]},{week:3,narrative:"Halfway through Saturday, the mower clanks, sputters — and stops. You're in the middle of the Washingtons' yard. It's broken. You have three more jobs scheduled today.",situation:"Your equipment broke mid-job. What do you do?",paStandard:"17.5.6-8.A",tip:"Equipment failure is a real business risk. How you handle problems for clients defines your professional reputation.",mathChallenge:{question:"The mower repair costs $20. You had 4 jobs scheduled at $25 each but only completed 1 before it broke. How much income did you lose by not completing the other 3 jobs?",answer:75,tolerance:0.01,hint:"Jobs not completed: 3. Income per job: $25. Lost income = 3 × $25 = ?"},reflectionPrompt:"Equipment breaking down is a 'business risk.' Name TWO things you could do BEFORE equipment breaks to reduce the damage it causes to your business. Explain each one in detail.",choices:[{text:"Call all clients to explain, reschedule, and use earnings to get the mower fixed ($20 repair)",impact:{income:25,expense:20,description:"Completed 1 job, repaired mower"},consequence:"Clients respected your honesty. The mower is repaired and ready. You lost some income today but kept every client relationship intact."},{text:"Borrow a neighbor's mower to finish all four jobs today, pay them $5",impact:{income:50,expense:5,description:"Borrowed mower, finished all jobs"},consequence:"Problem solved creatively! Reaching out for help is a strength. All clients were satisfied and you kept your income."},{text:"Finish the Washington job by hand with clippers and cancel the rest",impact:{income:25,expense:0,description:"Finished 1 job manually"},consequence:"You tried your best — but the manual job took 3 hours and the other clients were frustrated. Sometimes completing the minimum isn't enough."}]},{week:4,narrative:"August arrives and it's brutally hot — 95°F with high humidity. You have 4 lawns scheduled this Saturday. Your clients are counting on you, but mowing in this heat feels dangerous.",situation:"It's dangerously hot. What do you do about your scheduled jobs?",paStandard:"17.5.6-8.B",tip:"Managing risk applies to personal safety too. No income is worth risking your health.",mathChallenge:{question:"You start at 7am and finish 4 yards by noon (5 hours total) at $25 each. What are your total earnings? What is your average earnings per hour?",answer:20,tolerance:0.01,hint:"Total earnings: 4 × $25 = $100. Average per hour = $100 ÷ 5 hours = ?"},reflectionPrompt:"This scenario involves a risk to your personal health. How should personal safety be weighed against earning money? Write 2-3 sentences explaining your position and give a real-life example of someone facing this kind of decision.",choices:[{text:"Start at 7am before the heat peaks, take breaks, and finish all 4 yards by noon",impact:{income:80,expense:0,description:"Completed all jobs early morning"},consequence:"Smart planning! Early morning mowing is cooler and clients loved having it done before they woke up. You finished everything safely."},{text:"Text all clients to reschedule to next weekend due to heat advisory",impact:{income:0,expense:0,description:"Rescheduled all jobs safely"},consequence:"Your clients understood completely — one even thanked you for being safety-conscious. No income today, but you protected your health."},{text:"Push through the heat and complete all 4 yards, taking short water breaks",impact:{income:80,expense:0,description:"Pushed through — earned full pay"},consequence:"You completed the jobs but felt awful all day. You got lucky — heat exhaustion is a real danger. This risk happened to work out this time."}]},{week:5,narrative:"Your business is thriving! You have 6 regular clients. A friend asks if they can join you and you could take on 6 more yards together.",situation:"Should you expand your business with a partner?",paStandard:"17.4.6-8.F",tip:"Growing a business means more income but also more responsibility. Think through the costs before saying yes.",mathChallenge:{question:"You earn $25/yard with 6 clients = $150/weekend solo. With a partner you'd have 12 clients at $25 each, split 50/50. How much would YOU earn per weekend in the partnership?",answer:150,tolerance:0.01,hint:"12 yards × $25 = $300 total. Your 50% share = $300 × 0.50 = ?"},reflectionPrompt:"The math shows you earn the same amount solo or with a partner — but with twice the clients covered. What are TWO non-financial benefits of having a business partner? What are TWO potential problems?",choices:[{text:"Say yes — split the work and earnings 50/50 with clear written terms",impact:{income:90,expense:0,description:"Expanded with partner"},consequence:"Great teamwork! With two of you working, you covered twice the ground. The written agreement prevented any confusion about pay."},{text:"Say no — you want to stay small and in full control of your business",impact:{income:60,expense:0,description:"Kept business solo"},consequence:"Staying in full control has value. You know exactly what you earn and what you're responsible for. Steady growth is a real strategy."},{text:"Take on 3 more yards yourself without a partner — push for growth solo",impact:{income:75,expense:0,description:"Expanded solo — 9 yards total"},consequence:"You handled it — barely. 9 yards in a weekend is exhausting. Stretching yourself too thin risks quality. Growth is good, but there are limits."}]},{week:6,narrative:"Fall is here. Leaves are falling, grass slows down, and the mowing season is winding up. You've built something real from scratch. Time to reflect on what you earned and learned.",situation:"The season is over. What do you do with everything you've built?",paStandard:"17.4.3-5.B",tip:"Seasonal businesses need off-season plans. Save when you earn so you have money during slow periods.",mathChallenge:{question:"You earned $600 this season. You plan to save 60%, reinvest 20% in equipment, and keep 20% to spend. How much goes to SAVINGS?",answer:360,tolerance:0.01,hint:"Savings: 60% of $600 = 0.60 × $600 = ?"},reflectionPrompt:"You built a real seasonal business this summer. Write 3 sentences describing what you would do differently next season. Consider pricing, marketing, equipment, and saving habits in your answer.",choices:[{text:"Save 60% of season earnings, put 20% toward a new service (leaf raking) and keep 20% to spend",impact:{income:0,expense:0,description:"Smart three-way split of earnings"},consequence:"Perfect financial thinking! You diversified into leaf raking to keep earning through fall, saved for winter, and rewarded yourself."},{text:"Save everything from the season to start strong next spring",impact:{income:0,expense:0,description:"Saved entire season's earnings"},consequence:"Disciplined saver! You'll enter next spring with a full wallet and zero startup stress. That's rare — and powerful."},{text:"Celebrate the season by spending most of your earnings — you'll rebuild next spring",impact:{income:0,expense:30,description:"Spent most of seasonal earnings"},consequence:"You enjoyed your rewards! Just remember — next spring you'll start closer to zero. Many seasonal workers struggle because they don't save during the busy season."}]}]},{id:"shopping",title:"Back to School Budget",icon:"🎒",description:"You have $100 for school supplies. Spend it wisely across six shopping decisions.",startBalance:100,paAreas:"17.3",weeks:[{week:1,narrative:"School starts in two weeks and your parents gave you $100 for all your supplies — folders, notebooks, pens, calculator, and anything else you need.",situation:"What's your first step before spending a single dollar?",paStandard:"17.3.6-8.A",tip:"A shopping list made before you enter a store prevents impulse buying and helps you stay on budget.",mathChallenge:{question:"You estimate: 5 notebooks ($2 each), 2 folders ($1.50 each), pens ($4), calculator ($25), binder ($8). What is the estimated TOTAL? How much of your $100 would be LEFT OVER? Enter the leftover amount.",answer:50,tolerance:0.01,hint:"Notebooks: 5×$2=$10. Folders: 2×$1.50=$3. Pens: $4. Calculator: $25. Binder: $8. Total = $50. Leftover = $100 - $50 = ?"},reflectionPrompt:"Why is making a list and estimating costs BEFORE shopping a smart financial habit? Describe what can go wrong when people shop without a plan. Give a specific example.",choices:[{text:"Write a detailed list of every item you need, estimated costs, and priorities",impact:{income:0,expense:0,description:"Created shopping plan"},consequence:"Excellent start! Research shows that shoppers with lists spend significantly less than those without. You're already thinking like a smart consumer."},{text:"Head to the store and see what you need when you're there",impact:{income:0,expense:15,description:"Impulse buys without a list"},consequence:"Without a plan, you picked up several things that looked cool but weren't on any supply list. That's $15 you might not be able to get back."},{text:"Ask your teachers for the official supply list before buying anything",impact:{income:0,expense:0,description:"Got official list first"},consequence:"Smart! You may have been about to buy things you don't need. Getting the actual list ensures every dollar is spent on something required."}]},{week:2,narrative:"You need five subject notebooks. At the store: name-brand 5-Star at $4.99 each, or store-brand at $1.99 each that look almost identical.",situation:"Five notebooks — name brand or store brand?",paStandard:"17.3.6-8.B",tip:"Compare quality, not just price. Store brands are often made in the same factories as name brands — but not always.",mathChallenge:{question:"Calculate the total for 5 name-brand notebooks at $4.99 AND 5 store-brand at $1.99. How much do you SAVE by choosing store brand?",answer:15,tolerance:0.01,hint:"Name brand: 5 × $4.99 = $24.95. Store brand: 5 × $1.99 = $9.95. Savings = $24.95 - $9.95 = ?"},reflectionPrompt:"Is 'name brand vs. store brand' always a simple choice? Describe a situation where paying MORE for the name brand might actually make sense. What factors would change your decision?",choices:[{text:"Buy all 5 store-brand notebooks and save $15",impact:{income:0,expense:10,description:"Bought 5 store-brand notebooks ($9.95)"},consequence:"Great value! You got everything you needed for $10 instead of $25. The notebooks are identical inside — you'll never notice the difference in class."},{text:"Buy 3 store-brand and 2 name-brand for classes where you write a lot",impact:{income:0,expense:16,description:"Mixed brand strategy ($16)"},consequence:"Thoughtful compromise! You saved on some while investing more where it matters. That's smart consumer decision-making."},{text:"Buy all 5 name-brand notebooks because you know they last longer",impact:{income:0,expense:25,description:"Bought 5 name-brand notebooks ($25)"},consequence:"You spent $25 on notebooks alone. They are better quality, but is the difference worth $15 extra? That's a big chunk of your total budget."}]},{week:3,narrative:"Walking through the store, you spot a massive Back to School sale — 40% off all pens, pencils, and highlighters. You need those items anyway, but the deal ends today.",situation:"There's a sale on supplies you need. How do you handle it?",paStandard:"17.3.3-5.A",tip:"Sales can be great savings — or psychological tricks. Only buy more than you need if you'll actually use it.",mathChallenge:{question:"Pens normally cost $4.00. With 40% off, what is the sale price? Highlighters normally cost $3.50, also 40% off. What is the TOTAL cost for both items at sale price?",answer:4.5,tolerance:0.05,hint:"Pens: $4.00 × (1-0.40) = $4.00 × 0.60 = $2.40. Highlighters: $3.50 × 0.60 = $2.10. Total = $2.40 + $2.10 = ?"},reflectionPrompt:"Stores use sales to get you to spend MORE money, not less. Explain how a '40% off' sale can actually lead to overspending. How can you protect yourself from this trap?",choices:[{text:"Buy exactly what you need for this year at the sale price",impact:{income:0,expense:6,description:"Bought needed supplies at 40% off"},consequence:"Smart! You saved 40% on things you needed anyway without overspending. That's exactly how sales should work."},{text:"Stock up on pens and highlighters for the whole year while the price is low",impact:{income:0,expense:14,description:"Stocked up at sale price"},consequence:"Good thinking if you'll actually use them! Buying more at a discount is a legitimate strategy — as long as it doesn't blow your budget."},{text:"Skip the sale — you'll buy supplies later and don't want to spend now",impact:{income:0,expense:0,description:"Skipped the sale"},consequence:"Missing a sale on things you needed means paying full price later. Patience is usually smart, but not when you know you'll definitely need something."}]},{week:4,narrative:"Your best friend wants you to buy the same $35 backpack they bought — a popular brand everyone is carrying this year. Your current backpack still works fine.",situation:"Friend pressure + a trendy backpack. What do you decide?",paStandard:"17.1.6-8.C",tip:"Social pressure is one of the biggest influences on spending. Ask yourself: do I want this, or do I want others to think I have it?",mathChallenge:{question:"You've spent $31 so far from your $100 budget. The backpack costs $35. If you buy it, what PERCENTAGE of your original $100 budget will you have used in total? Round to nearest whole percent.",answer:66,tolerance:1,hint:"Total spent if you buy: $31 + $35 = $66. Percentage used = ($66 ÷ $100) × 100 = ?"},reflectionPrompt:"Peer pressure is one of the biggest causes of overspending. Think about a purchase you've made (or wanted to make) because of what others thought. Was it worth it? What would you do differently?",choices:[{text:"Keep your current backpack — it works fine and you'd rather have that $35 for other things",impact:{income:0,expense:0,description:"Kept existing backpack"},consequence:"Strong move! You resisted social pressure and kept $35 in your budget. That money can cover several more essential supplies."},{text:"Buy the backpack — it's important to you and you have enough budget left",impact:{income:0,expense:35,description:"Bought trendy backpack"},consequence:"If it genuinely matters to you and you can afford it, that's a valid choice — just make sure you have everything you need first."},{text:"Tell your friend you'll look for the same bag at a thrift store or discount site",impact:{income:0,expense:12,description:"Found similar bag at discount"},consequence:"Excellent! You found a nearly identical bag for $12. You got the look, stayed social, and saved $23. Comparison shopping works beautifully."}]},{week:5,narrative:"First week of school — your Algebra teacher announces that a graphing calculator is required. It wasn't on the original list. A good one costs $50 at the school store.",situation:"You need a $50 calculator. How do you get it?",paStandard:"17.3.6-8.A",tip:"Before buying anything at a school store, check other options. The same item is almost always cheaper elsewhere.",mathChallenge:{question:"The calculator costs $50 at the school store and $22 online. What is the PERCENTAGE savings if you buy online instead? Round to nearest whole percent.",answer:56,tolerance:1,hint:"Savings amount: $50 - $22 = $28. Percentage saved = ($28 ÷ $50) × 100 = ?"},reflectionPrompt:"The school store charges much more than online retailers for the same calculator. Why do you think that is? Is it ever worth paying MORE for convenience? Describe a specific situation where paying extra might make sense.",choices:[{text:"Check if a sibling, neighbor, or classmate has last year's model you can borrow long-term",impact:{income:0,expense:0,description:"Borrowed calculator — free!"},consequence:"Score! A neighbor's older sibling had the exact model and was happy to loan it for the year. Zero cost. Always ask around before spending."},{text:"Search online for the same calculator — find a used one for $22",impact:{income:0,expense:22,description:"Bought used calculator online"},consequence:"Smart shopping! You saved $28 by checking an online marketplace. The calculator works identically to a new one. Used often means huge savings."},{text:"Buy it at the school store right away to have it before tomorrow's class",impact:{income:0,expense:50,description:"Bought at school store — full price"},consequence:"You have it for tomorrow — but you paid the highest possible price. The same calculator was available for much less. Convenience costs money."}]},{week:6,narrative:"You've bought everything on your list. You still have some money left over. You're putting away your new supplies, having stayed under budget. What a great feeling!",situation:"You came in under budget! What do you do with the extra money?",paStandard:"17.4.3-5.B",tip:"Coming in under budget is a victory. What you do with the savings matters just as much as saving it in the first place.",mathChallenge:{question:"You started with $100 and spent $67 total. How much money is LEFT OVER? What PERCENTAGE of your original budget did you save by staying under budget?",answer:33,tolerance:0.01,hint:"Leftover = $100 - $67 = $33. Percentage saved = ($33 ÷ $100) × 100 = 33%. Enter the DOLLAR amount left over."},reflectionPrompt:"You stayed under budget — a real financial achievement! Write 2-3 sentences describing the specific decisions you made during this scenario that helped you come in under $100. What was the hardest decision?",choices:[{text:"Put the remaining money in a savings account and leave it there",impact:{income:0,expense:0,description:"Saved the surplus"},consequence:"Perfect discipline! That money is now working for you and building your savings habit. Every dollar saved is a dollar toward your future goals."},{text:"Spend it on something fun — you stayed under budget, so this is your reward",impact:{income:0,expense:18,description:"Rewarded yourself with extra"},consequence:"You earned it! Coming under budget and using the difference intentionally is solid — just make sure it was really your choice and not just an impulse."},{text:"Ask your parents to keep it toward next year's school budget",impact:{income:0,expense:0,description:"Contributed to next year"},consequence:"Incredibly mature! You're thinking months ahead. Your parents were genuinely impressed — and next year, you'll start with a head start before they even contribute."}]}]},{id:"savings",title:"Saving for Something Big",icon:"🎯",description:"Set a savings goal of $150 and make smart decisions over six weeks to reach it.",startBalance:30,paAreas:"17.4 · 17.1",weeks:[{week:1,narrative:"You really want a new portable speaker — it costs $150 at the store. You currently have $30 saved. With some allowance, chores, and birthday money coming, you think you can reach $150 in 6 weeks.",situation:"How will you structure your savings plan?",paStandard:"17.4.6-8.B",tip:"A savings plan with a specific goal, timeline, and weekly target is far more effective than 'trying to save' with no structure.",mathChallenge:{question:"You need $150 total and already have $30. You have 6 weeks to save the rest. How much do you need to save each week to reach your goal exactly on time?",answer:20,tolerance:0.01,hint:"Amount still needed: $150 - $30 = $120. Divide by 6 weeks: $120 ÷ 6 = ?"},reflectionPrompt:"Think about a goal you have right now — not necessarily a purchase. How would breaking it into small weekly steps make it easier to achieve? Write 2-3 sentences connecting the savings strategy here to a personal goal of your own.",choices:[{text:"Set a weekly savings target: $20/week gets you to $150 in 6 weeks. Write it down.",impact:{income:20,expense:0,description:"Week 1 savings goal met"},consequence:"Goal + plan + action = results. You hit your Week 1 target. A written goal feels more real than a mental one — keep going!"},{text:"Save what you can each week without a specific target",impact:{income:10,expense:0,description:"Saved without a plan"},consequence:"Without a target, you saved less than half of what you needed. Vague intentions lead to vague results. A number makes saving feel real."},{text:"Find extra ways to earn — ask about extra chores or small jobs for neighbors",impact:{income:30,expense:0,description:"Earned extra from chores"},consequence:"Go-getter! You earned $30 in Week 1 by adding extra income sources. You're already 40% of the way to your goal!"}]},{week:2,narrative:"Your friend asks if you want to go to an amusement park this Saturday — tickets, food, and the ride home would cost about $40. You haven't been in over a year and it sounds amazing.",situation:"Do you go to the amusement park and spend $40, or protect your savings goal?",paStandard:"17.1.6-8.B",tip:"Opportunity cost means that choosing to spend $40 means giving up $40 toward your goal — and possibly delaying it by two weeks.",mathChallenge:{question:"If you spend $40 at the amusement park, how many extra WEEKS beyond your original 6-week plan will it take to make up the shortfall, if you still save $20/week?",answer:2,tolerance:0.01,hint:"The $40 shortfall must be made up at $20/week. Extra weeks = $40 ÷ $20 = ?"},reflectionPrompt:"'Delayed gratification' means waiting for something you want now to get something better later. Is this always the right choice? Write 2-3 sentences explaining WHEN delayed gratification makes sense and when it might not.",choices:[{text:"Skip the park — stay focused on your goal and suggest a free activity with friends instead",impact:{income:20,expense:0,description:"Skipped park, hit savings target"},consequence:"Disciplined! Your friend understood and you all had fun at a park for free. You stayed on track and will reach your goal on time."},{text:"Go to the park — you only live once and your goal can wait another week",impact:{income:0,expense:40,description:"Fun but set back savings by 2 weeks"},consequence:"You had an amazing day! But you spent $40 and missed your weekly target. Now you need to earn extra to catch up."},{text:"Go but set a hard $20 spending limit — pack snacks, skip expensive food",impact:{income:0,expense:20,description:"Went with a budget cap"},consequence:"Smart compromise! You had fun AND only spent half. You only fell $20 behind your target — very manageable to make up next week."}]},{week:3,narrative:"You spot your speaker on sale online — it's $120 instead of $150, but only for 48 hours. You currently have $75 saved. You're $45 short. You could borrow $45 from your older sibling.",situation:"The speaker is $30 off but you're $45 short. Do you borrow money to get it now?",paStandard:"17.6.3-5.E",tip:"Borrowing money costs you something — even from family. Make sure you can repay it quickly.",mathChallenge:{question:"The speaker is on sale for $120. You have $75. If you borrow $45 and buy now, how much do you save compared to buying it at full price of $150? Enter the SAVINGS amount.",answer:30,tolerance:0.01,hint:"Full price: $150. Sale price: $120. Savings = $150 - $120 = ?"},reflectionPrompt:"Borrowing money — even from family — is a form of credit. What are TWO potential problems with borrowing from a family member or friend? How might it affect the relationship if you can't pay it back on time?",choices:[{text:"Borrow $45 from your sibling, buy it now, and commit to paying them back in 3 weeks",impact:{income:0,expense:120,description:"Bought speaker — saved $30 vs full price"},consequence:"You saved $30 and got your goal item early! But you now owe your sibling $45. Make sure you pay it back on time — debt to family can cause real tension."},{text:"Wait — don't borrow. Keep saving and buy it at full price when ready",impact:{income:25,expense:0,description:"Stayed the course, saved this week"},consequence:"Patience! You avoided debt and kept your savings momentum. You'll pay $30 more for the speaker, but you'll buy it with clean money and owe nothing."},{text:"Look for the speaker used or refurbished — might already find it under $75",impact:{income:0,expense:70,description:"Found refurbished speaker at $70"},consequence:"Smart research! You found a certified refurbished model for $70 — within your current savings. You reached your goal early and paid $80 less than retail!"}]},{week:4,narrative:"Your grandparents sent you $25 for your birthday. It arrived right when you needed it most — you're $30 away from your savings goal with two weeks left.",situation:"You got $25 as a gift. What do you do with it?",paStandard:"17.4.3-5.B",tip:"A windfall — money you didn't plan on — is a chance to accelerate a goal. Using it wisely separates strong savers from impulsive spenders.",mathChallenge:{question:"You need $30 more to reach your $150 goal. If you put 60% of your $25 gift toward savings, how much goes to savings? How much more do you still need after that?",answer:15,tolerance:0.01,hint:"60% of $25 = 0.60 × $25 = $15 to savings. Enter the SAVINGS amount."},reflectionPrompt:"A 'windfall' is money you receive unexpectedly. Financial experts say most people spend windfalls within days. Why do you think that happens? What would be the smartest use of unexpected money and why?",choices:[{text:"Put the full $25 toward your speaker goal — you're now just $5 away!",impact:{income:25,expense:0,description:"Applied full gift to savings goal"},consequence:"You're $5 away from your goal! That $25 gift did in one moment what two weeks of saving would have done."},{text:"Split it — $15 to savings and $10 to spend on something you want now",impact:{income:15,expense:10,description:"Split gift — savings + fun"},consequence:"Balanced approach! You moved your goal forward while still treating yourself. You're now $15 away — still very reachable."},{text:"Spend the birthday money on fun — you have other savings for the goal",impact:{income:0,expense:25,description:"Spent birthday money on fun"},consequence:"Totally understandable — it's birthday money! But you missed a chance to reach your goal faster. You'll need two more strong savings weeks to get there."}]},{week:5,narrative:"You're almost there! But this week, your school is selling fundraiser chocolates and everyone's buying them. They cost $2 each and it's hard to say no.",situation:"Your friends are buying $2 chocolates for a school fundraiser. Do you buy any?",paStandard:"17.1.6-8.C",tip:"Small purchases feel harmless but add up fast. $2 here and $2 there can derail a savings plan faster than one big splurge.",mathChallenge:{question:"If you buy 5 chocolates at $2 each every week for a school year (36 weeks), how much would you spend in total? How many weeks of your $20 savings target does that equal?",answer:18,tolerance:0.01,hint:"Annual cost: 5 × $2 × 36 = $360. Weeks of savings lost: $360 ÷ $20 per week = ?"},reflectionPrompt:"Small, frequent purchases are called 'spending leaks.' Name TWO spending leaks common for people your age. How much could someone save in a year by eliminating just ONE of them? Show the math.",choices:[{text:"Buy just 1 chocolate ($2) — support the cause but stay close to your goal",impact:{income:20,expense:2,description:"One chocolate, still on target"},consequence:"Good judgment! You participated without going overboard. You stayed on your savings target and still felt part of the group."},{text:"Buy 5 chocolates — share with friends and feel good about supporting the school",impact:{income:20,expense:10,description:"Bought 5 chocolates — still on track"},consequence:"Generous! $10 is a meaningful contribution — and you still have enough to hit your goal this week. Your savings cushion handled it."},{text:"Don't buy any — you're this close to your goal and nothing will stop you",impact:{income:20,expense:0,description:"Skipped — stayed fully on track"},consequence:"Laser focus! You politely declined and your friends understood. Sometimes saying no to small things is what makes the big goal possible."}]},{week:6,narrative:"Week 6 is here. Check your balance — have you reached $150? Whatever your balance is, this is the end of your 6-week savings challenge. Time to reflect on what worked.",situation:"The challenge is over. What do you take away from this experience?",paStandard:"17.1.6-8.A",tip:"The skills you practiced — goal setting, delayed gratification, tracking progress — are more valuable than the item you were saving for.",mathChallenge:{question:"A savings account pays 3% interest per year (simple interest). If you deposit $150 and leave it for 2 years, what will your TOTAL balance be? (Simple interest: P × R × T)",answer:159,tolerance:0.01,hint:"Interest = $150 × 0.03 × 2 = $9. Total balance = $150 + $9 = ?"},reflectionPrompt:"You've completed the 6-week savings challenge. Write 3 sentences: (1) What was the hardest week and why? (2) What financial habit from this scenario will you actually try in real life? (3) What would you tell a friend who says 'I can never save money'?",choices:[{text:"Celebrate and immediately set your next savings goal",impact:{income:0,expense:0,description:"Goal achieved — set next target"},consequence:"Champion behavior! Immediately setting a new goal keeps the momentum going. Savers who always have an active goal build wealth steadily."},{text:"Identify exactly which week derailed you and learn from it",impact:{income:0,expense:0,description:"Analyzed what went wrong"},consequence:"Self-awareness is priceless. Knowing which decision cost you the most is more valuable than the $150 itself."},{text:"Open a savings account to put your money in where it can earn interest",impact:{income:1,expense:0,description:"Money earned interest! +$1"},consequence:"Smart next step! Even a small interest rate means your money grows while you sleep. Your $150 in a savings account earns a little extra every month."}]}]},{id:"emergency",title:"Unexpected Expenses",icon:"⚡",description:"You have $80 in savings. Six unexpected situations test how you handle financial surprises.",startBalance:80,paAreas:"17.5 · 17.4 · 17.3",weeks:[{week:1,narrative:"You've been saving $80 all summer and feeling pretty good about it. Then on Monday morning, your phone screen is badly cracked. It's barely readable. You need your phone for school and safety.",situation:"Your phone screen is cracked. What do you do?",paStandard:"17.5.6-8.A",tip:"Before paying for repairs, research every option. Prices vary enormously and there may be options you haven't thought of.",mathChallenge:{question:"Repair Option A costs $40. If you choose it, what PERCENTAGE of your $80 savings will you spend?",answer:50,tolerance:0.01,hint:"Percentage spent = (amount spent ÷ total savings) × 100. ($40 ÷ $80) × 100 = ?"},reflectionPrompt:"Before spending money on a repair or replacement, what are FOUR questions you should ask yourself? Write each question out and briefly explain why it matters.",choices:[{text:"Get it professionally repaired at a phone repair shop ($40)",impact:{income:0,expense:40,description:"Professional repair — phone like new"},consequence:"Your phone is as good as new! $40 is significant, but money well spent on something you rely on daily. Shop around — prices can vary by $20 or more."},{text:"Buy a $10 screen protector to hold it together and wait to repair it later",impact:{income:0,expense:10,description:"Temporary fix — saved $30 for now"},consequence:"Clever short-term fix! The protector holds the crack and buys you time to research options or save up. Sometimes waiting lets you make a better decision."},{text:"Check if your parents have a phone protection plan that covers screen repairs",impact:{income:0,expense:0,description:"Covered by protection plan — free!"},consequence:"Smart first call! Your parents had a plan that covered this. Always check insurance or protection plans before paying out of pocket."}]},{week:2,narrative:"Your school announces an optional field trip to a science museum next Friday. Cost is $25 and includes the bus and lunch. You want to go, but $25 is a significant chunk of what you have left.",situation:"A school trip costs $25. Can you justify it?",paStandard:"17.3.3-5.A",tip:"Educational experiences have real value. But 'optional' means you have a genuine choice — weigh it honestly.",mathChallenge:{question:"After last week, check your current balance. The field trip costs $25. If you go, what percentage of your REMAINING savings will the trip cost? Use your actual current balance from the sidebar.",answer:35.7,tolerance:5,hint:"If balance = $70: ($25 ÷ $70) × 100 = 35.7%. If $40: ($25 ÷ $40) × 100 = 62.5%. If $80: ($25 ÷ $80) × 100 = 31.25%. Use your current balance from the sidebar."},reflectionPrompt:"This is an 'optional' expense. How do you decide which optional expenses are worth it? Create your own personal rule for deciding when to spend on optional things. Be specific and explain your reasoning.",choices:[{text:"Go — educational experiences are worth the $25 and you have enough left",impact:{income:0,expense:25,description:"Attended field trip"},consequence:"Great choice! The museum was amazing and you learned things that connected directly to class. Experiences are investments in knowledge."},{text:"Skip the trip and protect your savings — you can visit the museum another time",impact:{income:0,expense:0,description:"Skipped trip — kept savings"},consequence:"Responsible decision. Your savings are staying intact for things that might matter more. You added the museum to your future visit list."},{text:"Ask your parent or guardian if they can cover it since it's school-related",impact:{income:0,expense:0,description:"Parent covered the cost"},consequence:"There's nothing wrong with asking! Educational field trips are something parents often want to support. Being open about finances with family is healthy."}]},{week:3,narrative:"You borrowed two library books in September and just found them stuffed under your bed, three weeks overdue. The library charges $0.25/day per book.",situation:"You have overdue library fines. What's your plan?",paStandard:"17.6.3-5.E",tip:"Small fees add up faster than you expect. Overdue fines, late fees, and penalties are 100% avoidable costs that only hurt you.",mathChallenge:{question:"You have 2 books that are 21 days overdue at $0.25/book/day. What is your TOTAL fine? If you wait ONE more week (7 days) before returning them, how much MORE will you owe?",answer:3.5,tolerance:0.01,hint:"Current fine: 2 × $0.25 × 21 = $10.50. Additional week: 2 × $0.25 × 7 = ? Enter just the ADDITIONAL cost of waiting one more week."},reflectionPrompt:"Library fines, late fees, and penalties are 'avoidable costs.' Name THREE other avoidable costs that people commonly pay. What habit would help you avoid each one?",choices:[{text:"Pay the fine immediately and return the books today",impact:{income:0,expense:11,description:"Paid fine, returned books"},consequence:"Clean slate! Paying obligations quickly prevents them from growing. You learned a $10 lesson about returning borrowed items on time."},{text:"Ask the librarian if they have a fine forgiveness program for students",impact:{income:0,expense:0,description:"Fine waived through program"},consequence:"Smart ask! Many libraries have programs that forgive fines for students on a first offense. You only get answers you ask for."},{text:"Keep the books for now — paying fines later doesn't change the amount much",impact:{income:0,expense:0,description:"Delayed — fines kept growing"},consequence:"Actually, fines keep growing daily! By waiting another week, you owe even more. Delay never helps with fees — they compound just like debt."}]},{week:4,narrative:"Your close friend's birthday is this weekend. You want to give a real gift, but you're watching your budget carefully. Birthday gifts often cost $20–30 for friends your age.",situation:"It's your friend's birthday. How much do you spend on a gift?",paStandard:"17.3.6-8.A",tip:"Meaningful gifts don't have to be expensive. Thoughtfulness and creativity often matter more than price.",mathChallenge:{question:"Three friends are splitting a $45 birthday gift equally. What does each person pay? If instead each person puts in $8 for a group gift, what is the TOTAL value of the group gift? Enter the group gift TOTAL.",answer:24,tolerance:0.01,hint:"Split option: $45 ÷ 3 = $15 each. Group gift: 3 people × $8 = ? Enter the total group gift value."},reflectionPrompt:"Gift-giving is important socially, but it can pressure people to spend more than they can afford. How would you handle a situation where you genuinely cannot afford a gift for a friend? What would you say or do?",choices:[{text:"Make a personalized gift (a playlist, a photo collage, a handwritten note) — cost $3 for materials",impact:{income:0,expense:3,description:"Gave a thoughtful personal gift"},consequence:"Your friend was genuinely touched. The personal effort meant more than something bought off a shelf. Thoughtfulness is free — creativity is priceless."},{text:"Buy a $20 gift card — simple, flexible, and appropriate",impact:{income:0,expense:20,description:"Bought $20 gift card"},consequence:"A solid, reliable choice. Your friend appreciated the flexibility. $20 is a fair and respectful gift for a close friend."},{text:"Organize the whole friend group to split a bigger gift — you each chip in $8",impact:{income:0,expense:8,description:"Split gift with group — $8 share"},consequence:"Brilliant! Group gifting means your friend gets something bigger and better, everyone spends less, and organizing it is fun too."}]},{week:5,narrative:"While scrolling online, you see a huge sale on wireless earbuds — normally $70, now $35 for the next 4 hours only. You've wanted these for months and the deal is real.",situation:"A great deal on something you've wanted. Do you buy them?",paStandard:"17.3.6-8.A",tip:"Time pressure is a sales tactic. A great deal on something you don't need is still money you didn't plan to spend.",mathChallenge:{question:"The earbuds are 50% off at $35. If your current savings are $41 and you buy them, what percentage of your ORIGINAL $80 savings would you have left after the purchase?",answer:7.5,tolerance:1,hint:"Remaining after purchase: $41 - $35 = $6. Percentage of original $80: ($6 ÷ $80) × 100 = ?"},reflectionPrompt:"The '4-hour sale' creates urgency. This is a deliberate psychological tactic. Name TWO other psychological tactics stores use to get you to spend more money. Explain how each one works on shoppers.",choices:[{text:"Pass — your savings have been hit by real expenses and $35 is too much right now",impact:{income:0,expense:0,description:"Resisted the deal"},consequence:"Real discipline under real pressure! The deal was genuine but your financial situation said no. There will always be another sale."},{text:"Buy them — $35 for $70 earbuds is a real deal and you've wanted them for months",impact:{income:0,expense:35,description:"Bought earbuds on sale"},consequence:"You scored a good deal on something you genuinely wanted. Just note: this was a want, not a need. Make sure your savings can still handle a real emergency."},{text:"Wait 24 hours before deciding — if the deal is gone, it wasn't meant to be",impact:{income:0,expense:0,description:"Waited — decided with a clear head"},consequence:"The 24-hour rule is one of the best personal finance habits. The sale did end — but you made the decision with clarity, not urgency."}]},{week:6,narrative:"Six weeks of surprise expenses are behind you. Check your balance — how did you do? Some hits were unavoidable, some were choices. Reviewing your decisions is the most important final step.",situation:"The six weeks are over. What's your biggest financial takeaway?",paStandard:"17.5.6-8.B",tip:"An emergency fund isn't about having extra money — it's about staying calm when things go wrong. That calm lets you make better decisions.",mathChallenge:{question:"Financial experts recommend an emergency fund equal to 3 months of expenses. If your monthly expenses are $45, what should your emergency fund target be? How much MORE than your starting $80 would that require?",answer:55,tolerance:0.01,hint:"3-month fund: 3 × $45 = $135. Additional needed beyond $80: $135 - $80 = ?"},reflectionPrompt:"Look back at all six weeks. Write 3-4 sentences: Which expense hit you hardest? Which decision are you most proud of? What ONE financial habit would have made the most difference in your final balance?",choices:[{text:"Commit to rebuilding your savings back above $80 before spending on wants",impact:{income:0,expense:0,description:"Set recovery savings goal"},consequence:"Exactly right! Rebuilding your emergency fund is priority one after it gets used. An empty savings account leaves you vulnerable to the next surprise."},{text:"Start tracking every expense going forward in a notebook or phone note",impact:{income:0,expense:0,description:"Started expense tracking habit"},consequence:"Game-changer habit! Most people are shocked when they see where their money actually goes. Tracking turns invisible spending into visible choices."},{text:"Talk to a trusted adult about how they handle unexpected expenses in their own life",impact:{income:0,expense:0,description:"Learned from experienced adult"},consequence:"Wisdom is a resource! Every experienced adult has stories of surprise expenses. Learning how they handled it is free financial education."}]}]}];

const DIFFICULTIES=[{id:"beginner",label:"Just Starting Out",grade:"Grades 3–5",badge:"badge-green",desc:"Basic money concepts and simple decisions"},{id:"intermediate",label:"Getting the Hang of It",grade:"Grades 6–8",badge:"badge-amber",desc:"Income, expenses, budgeting and tradeoffs"},{id:"pro",label:"Money Pro",grade:"Grades 9–12",badge:"badge-coral",desc:"Opportunity cost, credit, risk and planning"}];

function App(){
  const [screen,setScreen]=useState("welcome");
  const [name,setName]=useState("");
  const [difficulty,setDifficulty]=useState(null);
  const [scenario,setScenario]=useState(null);
  const [weekIndex,setWeekIndex]=useState(0);
  const [phase,setPhase]=useState("math");
  const [gameState,setGameState]=useState({balance:0,totalIncome:0,totalExpenses:0,ledger:[]});
  const [selectedChoice,setSelectedChoice]=useState(null);
  const [history,setHistory]=useState([]);
  const [activeTab,setActiveTab]=useState("scenario");
  const [mathAnswer,setMathAnswer]=useState("");
  const [mathResult,setMathResult]=useState(null);
  const [mathAttempts,setMathAttempts]=useState(0);
  const [mathUnlocked,setMathUnlocked]=useState(false);
  const [reflectText,setReflectText]=useState("");

  const startScenario=sc=>{
    setScenario(sc);setWeekIndex(0);setPhase("math");setSelectedChoice(null);
    setHistory([]);setActiveTab("scenario");
    setMathAnswer("");setMathResult(null);setMathAttempts(0);setMathUnlocked(false);setReflectText("");
    setGameState({balance:sc.startBalance,totalIncome:0,totalExpenses:0,ledger:[{week:"Start",description:"Starting balance",income:sc.startBalance,expense:0,balance:sc.startBalance}]});
    setScreen("game");
  };

  const checkMath=()=>{
    const w=scenario.weeks[weekIndex];
    const ua=parseFloat(mathAnswer.replace(/[$,%]/g,"").trim());
    const ok=Math.abs(ua-w.mathChallenge.answer)<=w.mathChallenge.tolerance;
    const na=mathAttempts+1;setMathAttempts(na);
    if(ok){setMathResult("correct");setTimeout(()=>{setMathUnlocked(true);setMathResult(null);},1200);}
    else setMathResult("wrong");
  };

  const makeChoice=choice=>{
    setSelectedChoice(choice);
    const {income,expense,description}=choice.impact;
    const newBal=gameState.balance+income-expense;
    const cw=scenario.weeks[weekIndex];
    setGameState(prev=>({balance:newBal,totalIncome:prev.totalIncome+income,totalExpenses:prev.totalExpenses+expense,
      ledger:[...prev.ledger,{week:"Week "+cw.week,description,income,expense,balance:newBal}]}));
