<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Money Moves — PA Financial Literacy</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f7f2;color:#1a1a1a;min-height:100vh}
#root{max-width:860px;margin:0 auto;padding:24px 16px}

/* screens */
.screen{animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* typography */
.app-logo{font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#639922;margin-bottom:28px}
.hero-title{font-size:32px;font-weight:700;line-height:1.25;margin-bottom:8px;color:#1a1a1a}
.hero-sub{font-size:16px;color:#555;margin-bottom:28px;line-height:1.6}
.section-title{font-size:20px;font-weight:700;margin-bottom:6px}

/* buttons */
button{cursor:pointer;font-family:inherit;font-size:15px;border:none;transition:all .15s}
.btn{padding:11px 22px;border-radius:8px;font-weight:600}
.btn-primary{background:#3B6D11;color:#fff}
.btn-primary:hover{background:#27500A}
.btn-primary:disabled{background:#9bbf76;cursor:not-allowed}
.btn-secondary{background:#fff;color:#1a1a1a;border:1.5px solid #ddd}
.btn-secondary:hover{background:#f0f4eb;border-color:#639922}
.btn-sm{padding:8px 16px;font-size:13px}

/* inputs */
input[type=text]{font-family:inherit;font-size:16px;padding:11px 14px;border:1.5px solid #ddd;border-radius:8px;outline:none;width:100%;background:#fff;color:#1a1a1a}
input[type=text]:focus{border-color:#639922;box-shadow:0 0 0 3px rgba(99,153,34,.15)}

/* cards */
.card{background:#fff;border-radius:12px;border:1.5px solid #e8ede0;padding:20px}
.card-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.card-grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.selectable{cursor:pointer;transition:border-color .15s,box-shadow .15s}
.selectable:hover{border-color:#639922;box-shadow:0 2px 8px rgba(99,153,34,.15)}
.selectable.selected{border-color:#3B6D11;border-width:2px;background:#f0f4eb}

/* difficulty badges */
.badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:.04em;margin-bottom:10px}
.badge-green{background:#d4edaa;color:#27500A}
.badge-amber{background:#fde9b0;color:#7a4f00}
.badge-coral{background:#fdd5c8;color:#7a2800}

/* welcome grid */
.feature-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:460px}
.feature-item{background:#fff;border:1.5px solid #e8ede0;border-radius:10px;padding:16px;text-align:center}
.feature-icon{font-size:26px;margin-bottom:8px}
.feature-label{font-size:13px;color:#555;font-weight:500}

/* scenario cards */
.scenario-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.scenario-card{background:#fff;border:1.5px solid #e8ede0;border-radius:12px;padding:18px;cursor:pointer;transition:all .15s}
.scenario-card:hover{border-color:#639922;box-shadow:0 3px 12px rgba(99,153,34,.18);transform:translateY(-2px)}
.scenario-icon{font-size:30px;display:block;margin-bottom:10px}
.scenario-title{font-size:14px;font-weight:700;margin-bottom:5px}
.scenario-desc{font-size:12px;color:#666;line-height:1.5}
.scenario-tag{font-size:11px;color:#639922;font-weight:600;margin-top:8px}

/* game layout */
.game-wrap{display:grid;grid-template-columns:1fr 210px;gap:16px;align-items:start}
.game-main{display:flex;flex-direction:column;gap:14px}
.game-sidebar{display:flex;flex-direction:column;gap:12px}

/* narrative card */
.week-pill{display:inline-flex;align-items:center;gap:6px;background:#e8f0d8;color:#3B6D11;font-size:12px;font-weight:700;padding:5px 12px;border-radius:20px;margin-bottom:14px}
.narrative-text{font-size:15px;line-height:1.75;color:#1a1a1a;margin-bottom:12px}
.situation-box{background:#f5f7f2;border-left:3px solid #639922;border-radius:0 8px 8px 0;padding:12px 14px;font-size:14px;font-weight:600;color:#333;margin-bottom:16px;line-height:1.5}
.result-banner{background:#e8f5d0;border:1.5px solid #b5d87a;border-radius:8px;padding:12px 14px;margin-bottom:14px;font-size:13px;color:#27500A;line-height:1.5}
.result-banner strong{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;color:#3B6D11}

/* choices */
.choices{display:flex;flex-direction:column;gap:9px}
.choice-btn{background:#fff;border:1.5px solid #ddd;border-radius:10px;padding:13px 15px;text-align:left;transition:all .15s;line-height:1.5}
.choice-btn:hover{border-color:#639922;background:#f5f9ee;transform:translateX(3px)}
.choice-btn:active{transform:scale(.99)}
.choice-letter{display:inline-block;width:22px;height:22px;background:#3B6D11;color:#fff;border-radius:50%;font-size:12px;font-weight:700;text-align:center;line-height:22px;margin-right:10px;flex-shrink:0}
.choice-row{display:flex;align-items:flex-start;gap:0}
.choice-impact{font-size:12px;color:#666;margin-top:5px;margin-left:32px}
.impact-earn{color:#27500A;font-weight:600}
.impact-spend{color:#993C1D;font-weight:600}

/* stats sidebar */
.stat-card{background:#fff;border:1.5px solid #e8ede0;border-radius:10px;padding:14px}
.stat-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#888;margin-bottom:6px}
.stat-value{font-size:24px;font-weight:700}
.val-green{color:#27500A}
.val-red{color:#cc3300}
.tip-card{background:#fffbf0;border:1.5px solid #f5d87a;border-radius:10px;padding:14px}
.tip-head{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#7a5c00;margin-bottom:6px}
.tip-text{font-size:12px;color:#5a4400;line-height:1.6}
.std-label{font-size:11px;color:#aaa;padding:6px 0}

/* progress */
.progress-wrap{margin-bottom:18px}
.progress-label{display:flex;justify-content:space-between;font-size:12px;color:#888;margin-bottom:6px;font-weight:600}
.progress-track{height:6px;background:#e0e8d0;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#639922,#3B6D11);border-radius:3px;transition:width .5s ease}

/* tab bar */
.tab-bar{display:flex;gap:8px;margin-bottom:18px}
.tab-btn{background:none;border:1.5px solid #ddd;border-radius:8px;padding:7px 16px;font-size:13px;font-weight:600;color:#666}
.tab-btn.active{background:#3B6D11;color:#fff;border-color:#3B6D11}
.tab-btn:hover:not(.active){border-color:#639922;color:#3B6D11}

/* spreadsheet */
.sheet-wrap{overflow-x:auto}
.sheet-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:4px}
.sheet-table th{background:#f0f4eb;padding:10px 12px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#3B6D11;border-bottom:2px solid #c8dba0}
.sheet-table td{padding:9px 12px;border-bottom:1px solid #eef2e8}
.sheet-table tr:last-child td{border-bottom:none}
.sheet-table tr:hover td{background:#fafcf7}
.sheet-table .total-row td{background:#f0f4eb;font-weight:700;border-top:2px solid #c8dba0}
.cell-earn{color:#27500A;font-weight:600}
.cell-spend{color:#cc3300;font-weight:600}
.cell-bal-pos{color:#27500A;font-weight:700}
.cell-bal-neg{color:#cc3300;font-weight:700}
.wk-label{font-size:11px;color:#888;font-weight:600}
.sheet-tip{font-size:12px;color:#666;margin-top:12px;font-style:italic}
.net-box{display:inline-block;padding:6px 14px;border-radius:6px;font-size:14px;font-weight:700;margin-top:12px}
.net-pos{background:#e8f5d0;color:#27500A}
.net-neg{background:#fde8e0;color:#cc3300}

/* summary */
.summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:20px 0}
.summary-stat{background:#fff;border:1.5px solid #e8ede0;border-radius:10px;padding:16px}
.summary-num{font-size:28px;font-weight:700;margin-top:6px}
.history-list{display:flex;flex-direction:column;gap:0}
.history-item{padding:10px 0;border-bottom:1px solid #eef2e8;font-size:13px;display:flex;align-items:baseline;gap:10px}
.history-wk{font-size:11px;font-weight:700;color:#639922;min-width:50px}
.history-choice{color:#333;line-height:1.5}
.outcome-msg{background:#e8f5d0;border:1.5px solid #b5d87a;border-radius:10px;padding:16px 18px;margin:16px 0;font-size:15px;color:#27500A;line-height:1.6}
.outcome-msg.loss{background:#fde8e0;border-color:#f5b5a0;color:#993C1D}
.action-row{display:flex;gap:12px;margin-top:20px;flex-wrap:wrap}

/* nav */
.nav-row{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.back-btn{background:none;border:none;font-size:13px;color:#888;font-weight:600;padding:0;display:flex;align-items:center;gap:4px}
.back-btn:hover{color:#3B6D11}
.screen-title{font-size:20px;font-weight:700}

/* loading */
.loading-wrap{display:flex;align-items:center;gap:10px;padding:20px 0;color:#888;font-size:14px}
.spin{width:18px;height:18px;border:2px solid #e0e8d0;border-top-color:#639922;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* responsive */
@media(max-width:640px){
  .card-grid-3,.scenario-grid,.diff-grid{grid-template-columns:1fr 1fr}
  .game-wrap{grid-template-columns:1fr}
  .game-sidebar{display:grid;grid-template-columns:repeat(2,1fr)}
  .summary-grid{grid-template-columns:repeat(2,1fr)}
  .feature-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const {useState} = React;

/* =====================================================================
   SCENARIO DATA — All pre-written, no API required
   PA Standards: 17.1–17.6 (effective July 1, 2026)
   ===================================================================== */

const SCENARIOS = [
{

      narrative:"It's the hottest week of summer! Your neighbor Mrs. Chen is selling a big bag of lemons cheap, and your parents gave you the green light to set up a lemonade stand on the corner. You have $20 to start your business.",
      situation:"You need supplies to open your stand. How much will you spend to get started?",
      paStandard:'17.3.3-5.D', tip:"Keeping startup costs low means you reach profit faster — spend only what you truly need.",
      choices:[
        {text:"Buy the basics — lemons, sugar, paper cups, and a handmade sign ($8)",
         impact:{income:0,expense:8,description:"Bought basic supplies"},

         impact:{income:0,expense:18,description:"Bought premium supplies"},

        {text:"Use stuff from home and spend as little as possible ($3)",

      narrative:"Day one is here! Neighbors and kids are passing by on their way to the park. Your first customer, sweaty Mr. Alvarez from down the block, walks over with his wallet out.",

      paStandard:'17.2.3-5.G', tip:"The right price covers your costs and attracts customers. Too high = fewer sales. Too low = too little profit.",

    { week:3,

        {text:"Text neighbors to offer front-door lemonade delivery for $1.50 per cup",
         impact:{income:18,expense:3,description:"Delivered lemonade to neighbors"},
         consequence:"Creative pivot! Neighbors loved the delivery idea. You turned a bad weather day into a brand new service — and earned more than a normal day!"}
      ]
    },
    { week:4,
      narrative:"Uh oh. Your neighbor Jordan just opened their own lemonade stand two houses away. They're charging $0.75 a cup, have a big colorful umbrella, and are playing upbeat music.",
      situation:"A competitor just showed up. How do you respond?",
      paStandard:'17.3.6-8.A', tip:"Competition is normal in business. Often improving your product or service beats just lowering your price.",
      choices:[
        {text:"Match Jordan's $0.75 price and add a free cookie with every cup",
         impact:{income:15,expense:5,description:"Matched price, added cookie deal"},
         consequence:"The cookie combo was a huge hit! Loyal customers stayed and new ones came specifically for the deal. Smart competitive thinking."},
        {text:"Keep your price and trust that your loyal customers will stick with you",
         impact:{income:8,expense:0,description:"Kept original pricing"},
         consequence:"Some customers stayed loyal — but others drifted to Jordan's lower price. Competition is real and can quietly chip away at sales."},
        {text:"Walk over and propose that you and Jordan team up instead of compete",
         impact:{income:20,expense:0,description:"Partnered with Jordan"},
         consequence:"Brilliant! You split the block and sent customers to each other. Both stands thrived working together — cooperation can beat competition."}
      ]
    },
    { week:5,
      narrative:"You've been running the stand for a month and built up real earnings. School starts in three weeks. It's time to think about what happens to the money you've made.",
      situation:"The summer is ending — what do you do with your earnings?",
      paStandard:'17.4.3-5.B', tip:"A good habit is to divide any money you earn: some to save, some to spend, and some to reinvest or give.",
      choices:[
        {text:"Save 75% in a jar labeled for next summer, spend 25% on something you want",
         impact:{income:0,expense:0,description:"Saved most, spent a little"},
         consequence:"Great balance! You rewarded yourself AND kept most of your earnings for later. Financial experts call this 'paying yourself first.'"},

         impact:{income:0,expense:12,description:"Reinvested in future business"},

},

{
  id:'babysitting', title:'Babysitting Business', icon:'👶',

        {text:"Check if your parents have a phone protection plan that covers screen repairs",

         consequence:"Smart first call! Your parents had a plan that covered this. Always check insurance or protection plans before paying out of pocket — that's exactly what they're for."}
      ]
    },
    { week:2,
      narrative:"Your school announces an optional (but really fun) field trip to a science museum next Friday. Cost is $25 and includes the bus and lunch. You want to go, but $25 is a significant portion of what you have left.",
      situation:"A school trip costs $25. Can you justify it?",
      paStandard:'17.3.3-5.A', tip:"Educational experiences have value beyond entertainment. But 'optional' means you have a genuine choice — weigh it honestly.",
      choices:[
        {text:"Go — educational experiences are worth the $25 and you have enough left",
         impact:{income:0,expense:25,description:"Attended field trip"},
         consequence:"Great choice! The museum was amazing and you learned things that connected to class. Experiences are investments in knowledge — and this one was genuinely educational."},
        {text:"Skip the trip and protect your savings — you can visit the museum another time",
         impact:{income:0,expense:0,description:"Skipped trip — kept savings"},
         consequence:"Responsible decision. Your savings are staying intact for things that might matter more. You watched your classmates' photos and added the museum to your future visit list."},
        {text:"Ask your parent or guardian if they can cover it given that it's school-related",
         impact:{income:0,expense:0,description:"Parent covered the cost"},
         consequence:"There's nothing wrong with asking! Educational field trips are something parents often want to support. Being open about your finances with family is healthy."}
      ]
    },
    { week:3,
      narrative:"You borrowed two library books in September and just found them — stuffed under your bed, three weeks overdue. The library charges $0.25/day per book. That's $10.50 in fines you owe.",
      situation:"You have $10.50 in overdue library fines. What's your plan?",
      paStandard:'17.6.3-5.E', tip:"Small fees add up faster than you expect. Overdue fines, late fees, and penalties are 100% avoidable costs that only hurt you.",
      choices:[
        {text:"Pay the fine immediately and return the books today",
         impact:{income:0,expense:11,description:"Paid fine, returned books"},
         consequence:"Clean slate! Paying obligations quickly prevents them from growing. You also learned a $10 lesson about returning borrowed items on time — worth every penny."},
        {text:"Ask the librarian if they have a fine forgiveness program for students",
         impact:{income:0,expense:0,description:"Fine waived through program"},
         consequence:"Smart ask! Many libraries have programs that forgive fines for students, especially on a first offense, or in exchange for volunteering. You only get answers you ask for."},
        {text:"Keep the books for now — paying fines later doesn't change the amount much",
         impact:{income:0,expense:0,description:"Delayed — fines kept growing"},
         consequence:"Actually, fines keep growing daily! By waiting another week, you owe even more. Delay never helps with fees — they compound just like debt."}
      ]
    },
    { week:4,
      narrative:"Your close friend's birthday is this weekend. You want to give a real gift, but you're watching your budget carefully. Birthday gifts often cost $20–30 for friends your age.",
      situation:"It's your friend's birthday. How much do you spend on a gift?",
      paStandard:'17.3.6-8.A', tip:"Meaningful gifts don't have to be expensive. Thoughtfulness and creativity often matter more than price to people who care about you.",
      choices:[
        {text:"Make a personalized gift (a playlist, a photo collage, a handwritten note) — cost $3 for materials",
         impact:{income:0,expense:3,description:"Gave a thoughtful personal gift"},
         consequence:"Your friend was genuinely touched. The personal effort meant more than something bought off a shelf. Thoughtfulness is free — creativity is priceless."},
        {text:"Buy a $20 gift card — simple, flexible, and appropriate",
         impact:{income:0,expense:20,description:"Bought $20 gift card"},
         consequence:"A solid, reliable choice. Your friend appreciated the flexibility. $20 is a fair and respectful gift for a close friend — and you stayed within a reasonable budget."},
        {text:"Organize the whole friend group to split a bigger gift — you each chip in $8",
         impact:{income:0,expense:8,description:"Split gift with group — $8 share"},
         consequence:"Brilliant! Group gifting means your friend gets something bigger and better, everyone spends less, and the social experience of organizing it is fun too."}
      ]
    },
    { week:5,
      narrative:"While scrolling online, you see a huge sale on wireless earbuds — normally $70, now $35 for the next 4 hours only. You've wanted these for months and the deal is real. But your savings have taken some hits.",
      situation:"A great deal on something you've wanted. Do you buy them?",
      paStandard:'17.3.6-8.A', tip:"Time pressure is a sales tactic. A great deal on something you don't need is still money you didn't plan to spend. Ask: is this a want or a need right now?",
      choices:[
        {text:"Pass — your savings have been hit by real expenses and $35 is too much right now",
         impact:{income:0,expense:0,description:"Resisted the deal"},
         consequence:"Real discipline under real pressure! The deal was genuine but your financial situation said no. There will always be another sale. Your savings won't wait if something urgent hits."},
        {text:"Buy them — $35 for $70 earbuds is a real deal and you've wanted them for months",
         impact:{income:0,expense:35,description:"Bought earbuds on sale"},
         consequence:"You scored a good deal on something you genuinely wanted. Just note: this was a want, not a need. Make sure your savings can still handle a real emergency."},
        {text:"Wait 24 hours before deciding — if the deal is gone, it wasn't meant to be",
         impact:{income:0,expense:0,description:"Waited — decided with a clear head"},
         consequence:"The 24-hour rule is one of the best personal finance habits. The sale did end — but you made the decision with clarity, not urgency. That's worth more than earbuds."}
      ]
    },
    { week:6,
      narrative:"Six weeks of surprise expenses are behind you. Check your balance — how did you do? Some hits were unavoidable, some were choices. Reviewing your decisions is the last — and most important — step.",
      situation:"The six weeks are over. What's your biggest financial takeaway?",
      paStandard:'17.5.6-8.B', tip:"An emergency fund isn't about having extra money — it's about having calm when things go wrong. That calm lets you make better decisions.",
      choices:[
        {text:"Commit to rebuilding your savings back above $80 before spending on wants",
         impact:{income:0,expense:0,description:"Set recovery savings goal"},
         consequence:"Exactly right! Rebuilding your emergency fund is priority one after it gets used. An empty savings account leaves you vulnerable to the next surprise — and there's always a next one."},
        {text:"Start tracking every expense going forward in a notebook or phone note",
         impact:{income:0,expense:0,description:"Started expense tracking habit"},
         consequence:"Game-changer habit! Most people are shocked when they see where their money actually goes. Tracking turns invisible spending into visible choices you can control."},
        {text:"Talk to a trusted adult about how they handle unexpected expenses in their own life",
         impact:{income:0,expense:0,description:"Learned from experienced adult"},
         consequence:"Wisdom is a resource! Every experienced adult has stories of surprise expenses. Learning how they handled it — good and bad — is free financial education from the real world."}
      ]
    }
  ]
}
];

const DIFFICULTIES = [
  {id:'beginner', label:'Just Starting Out', grade:'Grades 3–5', badge:'badge-green', desc:'Basic money concepts and simple decisions'},
  {id:'intermediate', label:'Getting the Hang of It', grade:'Grades 6–8', badge:'badge-amber', desc:'Income, expenses, budgeting and tradeoffs'},
  {id:'pro', label:'Money Pro', grade:'Grades 9–12', badge:'badge-coral', desc:'Opportunity cost, credit, risk and planning'},
];

/* ===================================================================== */

function App() {
  const [screen, setScreen] = useState('welcome');
  const [name, setName] = useState('');
  const [difficulty, setDifficulty] = useState(null);
  const [scenario, setScenario] = useState(null);
  const [weekIndex, setWeekIndex] = useState(0);
  const [gameState, setGameState] = useState({balance:0, totalIncome:0, totalExpenses:0, ledger:[]});
  const [result, setResult] = useState(null);
  const [history, setHistory] = useState([]);
  const [activeTab, setActiveTab] = useState('scenario');
  const [showResult, setShowResult] = useState(false);

  const startScenario = (sc) => {
    setScenario(sc);
    setWeekIndex(0);
    setResult(null);
    setShowResult(false);
    setHistory([]);
    setActiveTab('scenario');
    setGameState({
      balance: sc.startBalance,
      totalIncome: 0,
      totalExpenses: 0,
      ledger: [{week:'Start', description:'Starting balance', income: sc.startBalance, expense:0, balance:sc.startBalance}]
    });
    setScreen('game');
  };

  const makeChoice = (choice) => {
    const {income, expense, description} = choice.impact;
    const newBal = gameState.balance + income - expense;
    const currentWeek = scenario.weeks[weekIndex];
    const newLedger = [...gameState.ledger, {
      week: `Week ${currentWeek.week}`,
      description,
      income,
      expense,
      balance: newBal
    }];
    const newHist = [...history, {week: currentWeek.week, choice: choice.text, consequence: choice.consequence}];
    setGameState({
      balance: newBal,
      totalIncome: gameState.totalIncome + income,
      totalExpenses: gameState.totalExpenses + expense,
      ledger: newLedger
    });
    setHistory(newHist);
    setResult({...choice, balanceAfter: newBal});
    setShowResult(true);
  };

  const nextWeek = () => {
    if (weekIndex + 1 >= scenario.weeks.length) {
      setScreen('summary');
    } else {
      setWeekIndex(weekIndex + 1);
      setResult(null);
      setShowResult(false);
    }
  };

  const pct = scenario ? Math.round((weekIndex / scenario.weeks.length) * 100) : 0;
  const currentWeek = scenario ? scenario.weeks[weekIndex] : null;
  const diff = DIFFICULTIES.find(d => d.id === difficulty);

  /* WELCOME */
  if (screen === 'welcome') return (
    <div className="screen">
      <div className="app-logo">PA Financial Literacy · Standards 17.1–17.6</div>
      <div className="hero-title">Money Moves</div>
      <div className="hero-sub">Work through real-life money scenarios and build financial skills that last a lifetime.</div>
      <div style={{display:'flex',gap:12,marginBottom:28,maxWidth:400}}>
        <input type="text" placeholder="Enter your name to begin..." value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&name.trim()&&setScreen('difficulty')} />
        <button className="btn btn-primary" onClick={()=>name.trim()&&setScreen('difficulty')} disabled={!name.trim()} style={{whiteSpace:'nowrap'}}>Let's go →</button>
      </div>
      <div className="feature-grid">
        {[['🍋','Earn money','Run a real business'],['💡','Make decisions','Face real tradeoffs'],['📊','Track it all','Built-in budget sheet']].map(([icon,title,sub])=>(
          <div key={title} className="feature-item">
            <div className="feature-icon">{icon}</div>
            <div style={{fontWeight:700,fontSize:13,marginBottom:3}}>{title}</div>
            <div className="feature-label">{sub}</div>
          </div>
        ))}
      </div>
      <div style={{marginTop:24,fontSize:12,color:'#999'}}>Aligned to PA Academic Standards for Personal Finance · Effective July 1, 2026</div>
    </div>
  );

  /* DIFFICULTY */
  if (screen === 'difficulty') return (
    <div className="screen">
      <button className="back-btn" onClick={()=>setScreen('welcome')}>← Back</button>
      <div className="hero-title" style={{marginTop:16,marginBottom:6}}>Hi, {name}! Pick your level</div>
      <div className="hero-sub">Don't worry — you can always challenge yourself with a harder level later.</div>
      <div className="card-grid-3" style={{marginBottom:24}}>
        {DIFFICULTIES.map(d=>(
          <div key={d.id} className={`card selectable${difficulty===d.id?' selected':''}`} onClick={()=>setDifficulty(d.id)}>
            <span className={`badge ${d.badge}`}>{d.grade}</span>
            <div style={{fontWeight:700,fontSize:15,marginBottom:5}}>{d.label}</div>
            <div style={{fontSize:13,color:'#666'}}>{d.desc}</div>
          </div>
        ))}
      </div>
      <button className="btn btn-primary" onClick={()=>difficulty&&setScreen('scenarios')} disabled={!difficulty}>Choose a scenario →</button>
    </div>
  );

  /* SCENARIOS */
  if (screen === 'scenarios') return (
    <div className="screen">
      <button className="back-btn" onClick={()=>setScreen('difficulty')}>← Back</button>
      <div className="hero-title" style={{marginTop:16,marginBottom:6}}>Choose a scenario</div>
      <div className="hero-sub" style={{marginBottom:20}}>Each one puts you in a real money situation. Pick one and see what you'd do.</div>
      <div className="scenario-grid">
        {SCENARIOS.map(s=>(
          <div key={s.id} className="scenario-card" onClick={()=>startScenario(s)}>
            <span className="scenario-icon">{s.icon}</span>
            <div className="scenario-title">{s.title}</div>
            <div className="scenario-desc">{s.description}</div>
            <div className="scenario-tag">PA Standards: {s.paAreas}</div>
          </div>
        ))}
      </div>
    </div>
  );

  /* GAME */
  if (screen === 'game' && currentWeek) return (
    <div className="screen">
      <div className="nav-row">
        <button className="back-btn" onClick={()=>setScreen('scenarios')}>← Scenarios</button>
        <span style={{flex:1}}/>
        <span style={{fontSize:13,color:'#888',fontWeight:600}}>{name} · {diff?.label}</span>
      </div>
      <div style={{fontSize:18,fontWeight:700,marginBottom:12}}>{scenario.icon} {scenario.title}</div>
      <div className="progress-wrap">
        <div className="progress-label"><span>Progress</span><span>Week {currentWeek.week} of {scenario.weeks.length}</span></div>
        <div className="progress-track"><div className="progress-fill" style={{width:`${pct}%`}}/></div>
      </div>
      <div className="tab-bar">
        <button className={`tab-btn${activeTab==='scenario'?' active':''}`} onClick={()=>setActiveTab('scenario')}>📖 Scenario</button>
        <button className={`tab-btn${activeTab==='budget'?' active':''}`} onClick={()=>setActiveTab('budget')}>📊 Budget Tracker</button>
      </div>

      {activeTab==='scenario' && (
        <div className="game-wrap">
          <div className="game-main">
            {!showResult ? (
              <div className="card">
                <div className="week-pill">Week {currentWeek.week}</div>
                <div className="narrative-text">{currentWeek.narrative}</div>
                <div className="situation-box">{currentWeek.situation}</div>
                <div className="choices">
                  {currentWeek.choices.map((c,i)=>(
                    <button key={i} className="choice-btn" onClick={()=>makeChoice(c)}>
                      <div className="choice-row">
                        <span className="choice-letter">{['A','B','C'][i]}</span>
                        <span style={{flex:1}}>{c.text}</span>
                      </div>
                      <div className="choice-impact">
                        {c.impact.income>0 && <span className="impact-earn">+${c.impact.income.toFixed(2)} income</span>}
                        {c.impact.expense>0 && <span className="impact-spend"> −${c.impact.expense.toFixed(2)} expense</span>}
                        {c.impact.income===0&&c.impact.expense===0 && <span>No immediate cost</span>}
                      </div>
                    </button>
                  ))}
                </div>
                <div className="std-label">PA Standard: {currentWeek.paStandard}</div>
              </div>
            ) : (
              <div className="card">
                <div className="week-pill">Week {currentWeek.week} — Result</div>
                <div className="result-banner">
                  <strong>You chose:</strong>
                  {result.text}
                </div>
                <div style={{fontSize:15,lineHeight:1.75,color:'#1a1a1a',marginBottom:16}}>{result.consequence}</div>
                <div style={{background:'#f5f7f2',borderRadius:8,padding:'12px 14px',marginBottom:16,fontSize:14}}>
                  {result.impact.income>0&&<div style={{color:'#27500A',fontWeight:600,marginBottom:4}}>💰 +${result.impact.income.toFixed(2)} earned</div>}
                  {result.impact.expense>0&&<div style={{color:'#cc3300',fontWeight:600,marginBottom:4}}>💸 −${result.impact.expense.toFixed(2)} spent</div>}
                  <div style={{fontWeight:700}}>New balance: ${result.balanceAfter.toFixed(2)}</div>
                </div>
                <button className="btn btn-primary" onClick={nextWeek}>
                  {weekIndex+1 >= scenario.weeks.length ? 'See my results →' : 'Next week →'}
                </button>
              </div>
            )}
          </div>
          <div className="game-sidebar">
            <div className="stat-card">
              <div className="stat-label">Balance</div>
              <div className={`stat-value ${gameState.balance>=scenario.startBalance?'val-green':'val-red'}`}>${gameState.balance.toFixed(2)}</div>
            </div>
            <div className="stat-card">
              <div className="stat-label">Earned</div>
              <div className="stat-value val-green">+${gameState.totalIncome.toFixed(2)}</div>
            </div>
            <div className="stat-card">
              <div className="stat-label">Spent</div>
              <div className="stat-value val-red">−${gameState.totalExpenses.toFixed(2)}</div>
            </div>
            <div className="tip-card">
              <div className="tip-head">💡 Money tip</div>
              <div className="tip-text">{currentWeek.tip}</div>
            </div>
          </div>
        </div>
      )}

      {activeTab==='budget' && (
        <div className="card">
          <div style={{fontWeight:700,fontSize:16,marginBottom:4}}>Your Budget Ledger</div>
          <div style={{fontSize:13,color:'#666',marginBottom:14}}>Auto-updated as you make decisions. This is your financial record for the {scenario.title} scenario.</div>
          <div className="sheet-wrap">
            <table className="sheet-table">
              <thead><tr><th>Period</th><th>Description</th><th>Income</th><th>Expense</th><th>Balance</th></tr></thead>
              <tbody>
                {gameState.ledger.map((row,i)=>(
                  <tr key={i}>
                    <td><span className="wk-label">{row.week}</span></td>
                    <td>{row.description}</td>
                    <td className="cell-earn">{row.income>0?`$${row.income.toFixed(2)}`:''}</td>
                    <td className="cell-spend">{row.expense>0?`$${row.expense.toFixed(2)}`:''}</td>
                    <td className={row.balance>=0?'cell-bal-pos':'cell-bal-neg'}>${row.balance.toFixed(2)}</td>
                  </tr>
                ))}
                {gameState.ledger.length > 1 && (
                  <tr className="total-row">
                    <td colSpan={2}>Totals</td>
                    <td className="cell-earn">${gameState.totalIncome.toFixed(2)}</td>
                    <td className="cell-spend">${gameState.totalExpenses.toFixed(2)}</td>
                    <td className={gameState.balance>=0?'cell-bal-pos':'cell-bal-neg'}>${gameState.balance.toFixed(2)}</td>
                  </tr>
                )}
              </tbody>
            </table>
          </div>
          <div className="sheet-tip">Net change from starting ${scenario.startBalance.toFixed(2)}: <span className={`net-box ${gameState.balance-scenario.startBalance>=0?'net-pos':'net-neg'}`}>{gameState.balance-scenario.startBalance>=0?'+':''}{(gameState.balance-scenario.startBalance).toFixed(2)}</span></div>
        </div>
      )}
    </div>
  );

  /* SUMMARY */
  if (screen === 'summary') return (
    <div className="screen">
      <div style={{fontSize:28,fontWeight:700,marginBottom:6}}>Scenario Complete! 🎉</div>
      <div style={{fontSize:16,color:'#666',marginBottom:16}}>{scenario.icon} {scenario.title} · {diff?.label}</div>
      <div className={`outcome-msg${gameState.balance<scenario.startBalance?' loss':''}`}>
        {gameState.balance >= scenario.startBalance
          ? `Great work, ${name}! You finished with $${gameState.balance.toFixed(2)} — that's $${(gameState.balance-scenario.startBalance).toFixed(2)} more than you started with.`
          : `You finished with $${gameState.balance.toFixed(2)}, which is $${(scenario.startBalance-gameState.balance).toFixed(2)} less than you started with. That's okay — every decision taught you something. Try again with different choices!`
        }
      </div>
      <div className="summary-grid">
        <div className="summary-stat">
          <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em',color:'#888'}}>Final Balance</div>
          <div className={`summary-num ${gameState.balance>=scenario.startBalance?'val-green':'val-red'}`}>${gameState.balance.toFixed(2)}</div>
        </div>
        <div className="summary-stat">
          <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em',color:'#888'}}>Total Earned</div>
          <div className="summary-num val-green">+${gameState.totalIncome.toFixed(2)}</div>
        </div>
        <div className="summary-stat">
          <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em',color:'#888'}}>Total Spent</div>
          <div className="summary-num val-red">−${gameState.totalExpenses.toFixed(2)}</div>
        </div>
      </div>
      <div className="card" style={{marginBottom:20}}>
        <div style={{fontWeight:700,fontSize:15,marginBottom:12}}>Your Decisions This Round</div>
        <div className="history-list">
          {history.map((h,i)=>(
            <div key={i} className="history-item">
              <span className="history-wk">Week {h.week}</span>
              <span className="history-choice">{h.choice}</span>
            </div>
          ))}
        </div>
      </div>
      <div className="action-row">
        <button className="btn btn-primary" onClick={()=>startScenario(scenario)}>Play again</button>
        <button className="btn btn-secondary" onClick={()=>setScreen('scenarios')}>Try another scenario</button>
        <button className="btn btn-secondary" onClick={()=>setScreen('difficulty')}>Change level</button>
      </div>
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
