    setHistory(prev=>[...prev,{week:cw.week,choice:choice.text,consequence:choice.consequence}]);
    setPhase("reflect");
  };

  const submitReflection=()=>{
    if(reflectText.trim().length<MIN_REFLECT)return;
    if(weekIndex+1>=scenario.weeks.length){setScreen("summary");}
    else{setWeekIndex(wi=>wi+1);setPhase("math");setMathAnswer("");setMathResult(null);setMathAttempts(0);setMathUnlocked(false);setReflectText("");setSelectedChoice(null);}
  };

  const cw=scenario?scenario.weeks[weekIndex]:null;
  const diff=DIFFICULTIES.find(d=>d.id===difficulty);
  const pct=scenario?Math.round((weekIndex/scenario.weeks.length)*100):0;

  if(screen==="welcome")return(
    <div className="screen">
      <div className="app-logo">PA Financial Literacy · Standards 17.1–17.6</div>
      <div className="hero-title">Money Moves</div>
      <div className="hero-sub">Work through real-life money scenarios, solve math challenges, and reflect on your decisions.</div>
      <div style={{display:"flex",gap:12,marginBottom:28,maxWidth:420}}>
        <input type="text" placeholder="Enter your name to begin..." value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&name.trim()&&setScreen("difficulty")} style={{flex:1}}/>
        <button className="btn btn-primary" onClick={()=>name.trim()&&setScreen("difficulty")} disabled={!name.trim()} style={{whiteSpace:"nowrap"}}>Let's go →</button>
      </div>
      <div className="feature-grid">
        {[["🍋","Earn & Spend","Run a real-life scenario"],["📐","Math Challenges","Solve a problem each week"],["✍️","Reflect & Write","Explain your thinking"],["📊","Budget Tracker","Live spreadsheet of decisions"]].map(([icon,title,sub])=>(
          <div key={title} className="feature-item"><div className="feature-icon">{icon}</div><div className="feature-title">{title}</div><div className="feature-label">{sub}</div></div>
        ))}
      </div>
      <div style={{marginTop:24,fontSize:12,color:"#999"}}>Aligned to PA Academic Standards for Personal Finance · Effective July 1, 2026 · No accounts or data collection</div>
    </div>
  );

  if(screen==="difficulty")return(
    <div className="screen">
      <button className="back-btn" onClick={()=>setScreen("welcome")}>← Back</button>
      <div className="hero-title" style={{marginTop:16,marginBottom:6}}>Hi, {name}! Pick your level</div>
      <div className="hero-sub">You can always challenge yourself with a harder level later.</div>
      <div className="card-grid-3" style={{marginBottom:24}}>
        {DIFFICULTIES.map(d=>(
          <div key={d.id} className={"card selectable"+(difficulty===d.id?" selected":"")} onClick={()=>setDifficulty(d.id)}>
            <span className={"badge "+d.badge}>{d.grade}</span>
            <div style={{fontWeight:700,fontSize:15,marginBottom:5}}>{d.label}</div>
            <div style={{fontSize:13,color:"#666"}}>{d.desc}</div>
          </div>
        ))}
      </div>
      <button className="btn btn-primary" onClick={()=>difficulty&&setScreen("scenarios")} disabled={!difficulty}>Choose a scenario →</button>
    </div>
  );

  if(screen==="scenarios")return(
    <div className="screen">
      <button className="back-btn" onClick={()=>setScreen("difficulty")}>← Back</button>
      <div className="hero-title" style={{marginTop:16,marginBottom:6}}>Choose a scenario</div>
      <div className="hero-sub" style={{marginBottom:20}}>Each scenario has 6 weeks of decisions, math problems, and reflection questions. Expect 20+ minutes per scenario.</div>
      <div className="scenario-grid">
        {SCENARIOS.map(s=>(
          <div key={s.id} className="scenario-card" onClick={()=>startScenario(s)}>
            <span className="scenario-icon">{s.icon}</span>
            <div className="scenario-title">{s.title}</div>
            <div className="scenario-desc">{s.description}</div>
            <div className="scenario-tag">PA Standards: {s.paAreas}</div>
          </div>
        ))}
      </div>
    </div>
  );

  if(screen==="game"&&cw)return(
    <div className="screen">
      <div className="nav-row">
        <button className="back-btn" onClick={()=>setScreen("scenarios")}>← Scenarios</button>
        <span style={{flex:1}}/>
        <span style={{fontSize:13,color:"#888",fontWeight:600}}>{name} · {diff?.label}</span>
      </div>
      <div style={{fontSize:18,fontWeight:700,marginBottom:12}}>{scenario.icon} {scenario.title}</div>
      <div className="progress-wrap">
        <div className="progress-label"><span>Progress</span><span>Week {cw.week} of {scenario.weeks.length}</span></div>
        <div className="progress-track"><div className="progress-fill" style={{width:pct+"%"}}/></div>
      </div>
      <div className="tab-bar">
        <button className={"tab-btn"+(activeTab==="scenario"?" active":"")} onClick={()=>setActiveTab("scenario")}>📖 Scenario</button>
        <button className={"tab-btn"+(activeTab==="budget"?" active":"")} onClick={()=>setActiveTab("budget")}>📊 Budget Tracker</button>
      </div>
      {activeTab==="scenario"&&(
        <div className="game-wrap">
          <div className="game-main">
            {phase==="math"&&(
              <div className="card">
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
                  <span className="week-pill">Week {cw.week}</span>
                  <span className="phase-pill phase-math">📐 Math Challenge</span>
                </div>
                <div className="narrative-text">{cw.narrative}</div>
                <div className="math-box">
                  <div className="math-head">📐 Solve this before making your decision</div>
                  <div className="math-question">{cw.mathChallenge.question}</div>
                  {!mathUnlocked?(
                    <>
                      <div className="math-input-row">
                        <span style={{fontSize:15,color:"#555",fontWeight:600}}>Answer:</span>
                        <input type="number" value={mathAnswer} onChange={e=>setMathAnswer(e.target.value)} onKeyDown={e=>e.key==="Enter"&&mathAnswer&&checkMath()} placeholder="0.00" step="0.01"/>
                        <button className="btn btn-primary" onClick={checkMath} disabled={!mathAnswer}>Check →</button>
                      </div>
                      {mathResult==="correct"&&<div className="math-feedback math-correct">✓ Correct! Unlocking your choices...</div>}
                      {mathResult==="wrong"&&(
                        <div className="math-feedback math-wrong">Not quite — try again!
                          {mathAttempts>=2&&<div className="math-hint">💡 Hint: {cw.mathChallenge.hint}</div>}
                        </div>
                      )}
                      {mathAttempts>0&&<div className="attempt-count">Attempts: {mathAttempts}{mathAttempts>=2?" (hint now showing)":""}</div>}
                    </>
                  ):(
                    <div className="math-feedback math-correct">✓ Correct! Your choices are unlocked below.</div>
                  )}
                </div>
                {mathUnlocked&&(
                  <>
                    <div className="situation-box">{cw.situation}</div>
                    <div className="choices">
                      {cw.choices.map((c,i)=>(
                        <button key={i} className="choice-btn" onClick={()=>makeChoice(c)}>
                          <div style={{display:"flex",alignItems:"flex-start"}}>
                            <span className="choice-letter">{["A","B","C"][i]}</span>
                            <span style={{flex:1}}>{c.text}</span>
                          </div>
                          <div className="choice-impact">
                            {c.impact.income>0&&<span className="impact-earn">+${c.impact.income.toFixed(2)} income</span>}
                            {c.impact.expense>0&&<span className="impact-spend"> −${c.impact.expense.toFixed(2)} expense</span>}
                            {c.impact.income===0&&c.impact.expense===0&&<span>No immediate cost</span>}
                          </div>
                        </button>
                      ))}
                    </div>
                    <div className="std-label">PA Standard: {cw.paStandard}</div>
                  </>
                )}
              </div>
            )}
            {phase==="reflect"&&selectedChoice&&(
              <div className="card">
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
                  <span className="week-pill">Week {cw.week}</span>
                  <span className="phase-pill phase-reflect">✍️ Reflection</span>
                </div>
                <div className="result-banner">
                  <strong>You chose:</strong>{selectedChoice.text}
                </div>
                <div style={{fontSize:15,lineHeight:1.75,color:"#1a1a1a",marginBottom:16}}>{selectedChoice.consequence}</div>
                <div style={{background:"#f5f7f2",borderRadius:8,padding:"12px 14px",marginBottom:20,fontSize:14}}>
                  {selectedChoice.impact.income>0&&<div style={{color:"#27500A",fontWeight:600,marginBottom:4}}>💰 +${selectedChoice.impact.income.toFixed(2)} earned</div>}
                  {selectedChoice.impact.expense>0&&<div style={{color:"#cc3300",fontWeight:600,marginBottom:4}}>💸 −${selectedChoice.impact.expense.toFixed(2)} spent</div>}
                  <div style={{fontWeight:700}}>New balance: ${gameState.balance.toFixed(2)}</div>
                </div>
                <div className="reflect-box">
                  <div className="reflect-head">✍️ Reflection — required before you can continue</div>
                  <div className="reflect-prompt">{cw.reflectionPrompt}</div>
                  <div className="reflect-requirement">Write at least {MIN_REFLECT} characters to continue.</div>
                  <textarea rows={5} style={{width:"100%"}} placeholder="Type your response here..." value={reflectText} onChange={e=>setReflectText(e.target.value)}/>
                  <div className="reflect-counter" style={{color:reflectText.length>=MIN_REFLECT?"#27500A":"#888"}}>{reflectText.length} / {MIN_REFLECT} characters minimum</div>
                </div>
                <button className="btn btn-primary" onClick={submitReflection} disabled={reflectText.trim().length<MIN_REFLECT}>
                  {weekIndex+1>=scenario.weeks.length?"See my results →":"Next week →"}
                </button>
                {reflectText.trim().length<MIN_REFLECT&&<div style={{fontSize:12,color:"#cc3300",marginTop:8}}>Keep writing — you need {MIN_REFLECT-reflectText.trim().length} more characters.</div>}
              </div>
            )}
          </div>
          <div className="game-sidebar">
            <div className="stat-card"><div className="stat-label">Balance</div><div className={"stat-value "+(gameState.balance>=scenario.startBalance?"val-green":"val-red")}>${gameState.balance.toFixed(2)}</div></div>
            <div className="stat-card"><div className="stat-label">Earned</div><div className="stat-value val-green">+${gameState.totalIncome.toFixed(2)}</div></div>
            <div className="stat-card"><div className="stat-label">Spent</div><div className="stat-value val-red">−${gameState.totalExpenses.toFixed(2)}</div></div>
            <div className="tip-card"><div className="tip-head">💡 Money tip</div><div className="tip-text">{cw.tip}</div></div>
          </div>
        </div>
      )}
      {activeTab==="budget"&&(
        <div className="card">
          <div style={{fontWeight:700,fontSize:16,marginBottom:4}}>Your Budget Ledger</div>
          <div style={{fontSize:13,color:"#666",marginBottom:14}}>Auto-updated as you make decisions.</div>
          <div className="sheet-wrap">
            <table className="sheet-table">
              <thead><tr><th>Period</th><th>Description</th><th>Income</th><th>Expense</th><th>Balance</th></tr></thead>
              <tbody>
                {gameState.ledger.map((row,i)=>(
                  <tr key={i}>
                    <td><span className="wk-label">{row.week}</span></td>
                    <td>{row.description}</td>
                    <td className="cell-earn">{row.income>0?"$"+row.income.toFixed(2):""}</td>
                    <td className="cell-spend">{row.expense>0?"$"+row.expense.toFixed(2):""}</td>
                    <td className={row.balance>=0?"cell-bal-pos":"cell-bal-neg"}>${row.balance.toFixed(2)}</td>
                  </tr>
                ))}
                {gameState.ledger.length>1&&(
                  <tr className="total-row">
                    <td colSpan={2}>Totals</td>
                    <td className="cell-earn">${gameState.totalIncome.toFixed(2)}</td>
                    <td className="cell-spend">${gameState.totalExpenses.toFixed(2)}</td>
                    <td className={gameState.balance>=0?"cell-bal-pos":"cell-bal-neg"}>${gameState.balance.toFixed(2)}</td>
                  </tr>
                )}
              </tbody>
            </table>
          </div>
          <div style={{fontSize:12,color:"#666",marginTop:12}}>Net change from starting ${scenario.startBalance.toFixed(2)}: <span className={"net-box "+(gameState.balance-scenario.startBalance>=0?"net-pos":"net-neg")}>{gameState.balance-scenario.startBalance>=0?"+":""}{(gameState.balance-scenario.startBalance).toFixed(2)}</span></div>
        </div>
      )}
    </div>
  );

  if(screen==="summary")return(
    <div className="screen">
      <div style={{fontSize:28,fontWeight:700,marginBottom:6}}>Scenario Complete! 🎉</div>
      <div style={{fontSize:16,color:"#666",marginBottom:16}}>{scenario.icon} {scenario.title} · {diff?.label}</div>
      <div className={"outcome-msg"+(gameState.balance<scenario.startBalance?" loss":"")}>
        {gameState.balance>=scenario.startBalance
          ?"Great work, "+name+"! You finished with $"+gameState.balance.toFixed(2)+" — $"+(gameState.balance-scenario.startBalance).toFixed(2)+" more than you started with."
          :"You finished with $"+gameState.balance.toFixed(2)+", which is $"+(scenario.startBalance-gameState.balance).toFixed(2)+" less than you started. That's okay — every decision taught you something. Try again!"}
      </div>
      <div className="summary-grid">
        <div className="summary-stat"><div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:"#888"}}>Final Balance</div><div className={"summary-num "+(gameState.balance>=scenario.startBalance?"val-green":"val-red")}>${gameState.balance.toFixed(2)}</div></div>
        <div className="summary-stat"><div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:"#888"}}>Total Earned</div><div className="summary-num val-green">+${gameState.totalIncome.toFixed(2)}</div></div>
        <div className="summary-stat"><div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:"#888"}}>Total Spent</div><div className="summary-num val-red">−${gameState.totalExpenses.toFixed(2)}</div></div>
      </div>
      <div className="card" style={{marginBottom:20}}>
        <div style={{fontWeight:700,fontSize:15,marginBottom:12}}>Your Decisions This Round</div>
        <div className="history-list">
          {history.map((h,i)=>(
            <div key={i} className="history-item"><span className="history-wk">Week {h.week}</span><span>{h.choice}</span></div>
          ))}
        </div>
      </div>
      <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
        <button className="btn btn-primary" onClick={()=>startScenario(scenario)}>Play again</button>
        <button className="btn btn-secondary" onClick={()=>setScreen("scenarios")}>Try another scenario</button>
        <button className="btn btn-secondary" onClick={()=>setScreen("difficulty")}>Change level</button>
      </div>
    </div>
  );
  return null;
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
